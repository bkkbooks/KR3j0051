body:
  text: 賔退録卷十宋趙與峕撰臧哀伯云武王克商遷九鼎於雒邑義士猶或非之義士即多士所謂遷殷頑民者也由周而言則為頑民由商而論則為義士矣此説近世陳同甫亮始發之杜預謂為伯夷之屬非也禮曰銘者自名也自名以稱揚其先祖之美而明著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之又曰其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也碑志行狀之法具於是矣若無美而必欲諛墓有惡而飾以為美卑官下士猶足以誑不知之人仕稍通顯則其善惡已著於人之耳目何可誣也莫儔靖康末所為雖三尺童子亦恨不誅之而孫仲益尚書志其墓顧謂靖康之變臺諫爭請和戎皆斥廢不用而二三狂生抗首大言乘險徼幸試之一擲卒至誤國髙宗狩維揚移蹕臨安國步阽危至此極矣而進取之士終以和戎為諱此翰林莫公所以投間置散至於老死不用斯言也不幾於欺天乎及作韓忠武志則又以嶽武穆為跋扈而與范瓊同稱善惡復混淆矣嶽之禍承權臣風旨而誣以不臣者万俟忠靖羅彥濟汝楫也洪文惠志羅墓不書此事正得稱美不稱惡之義而仲益志万俟則顯書之何哉張子韶侍郎學問氣節表表一世參禪學佛與其平生自不相掩張亦未嘗以此為諱其從子榕作家傳欲為文飾乃謂張有學説云釋老虛無耳不可有聞目不可有見則是靜言庸違張必不然余獨喜李文簡志趙待制開墓既歷敘其在蜀理財治賦之功且謂為當時第一繼云或者咎公竭澤而漁使來者無所施其智巧今雖纍經蠲放而害終不去當時稍存平恕則今日之害決不至此嗚呼此所謂責人終無已者也然公亦不得不任其咎昔蘇綽在西魏佐周武帝以國用不足為征稅之法頗重既而歎曰今所為者正如張弓非平世法也後之君子誰能弛乎綽子威聞其言每以為己任及相隋文帝奏減賦役務從輕簡帝悉從之彼蘇威顧能如此曾謂今日無若蘇威者乎此燾深所歎息詳紀之以俟來世又南軒作宇文閬州邦獻志謂初君以二父世科為念刻苦習進士業為進士者多推稱之兩以鎖廳試類省輒下益力後雖已領州符猶不置蓋終其身以是為歉栻嘗以謂自先王教胄子之法壞大家世族不得盡成其材其下者茍從祿利不樂親文墨事至其間讀書欲自表見者則不屑其世祿顧反以從進士覔舉得之為榮噫昔之人所望於胄子者豈為是哉若君居家孝友涖官廉平溫厚博雅于以進德孰能禦之顧區區猶以是為歉何哉二公之作蓋又因以立言垂世不特銘墓而已若李茂嘉謨墓志所謂明赦至建康吕忠穆怡然自若時李為江東副漕以言責之吕躊躇未行而張忠獻檄書至盡與諸家記事之書不合則熊子復克小歷李氏心傳繫年要録已有疑於仲益之言矣蔡伯喈曰吾為人作銘未嘗不有慙容唯為郭有道碑頌無愧耳後之秉筆者亦能自訟如此否乎紹聖四年殿試考官得胡安國之䇿定為第一將唱名宰執惡其不詆元祐而何昌言䇿云元祐臣寮不知君臣之義父子之恩擢為首選方天若策云當是時鶴髮宵人棊布要路今家財猶未籍沒子孫猶未禁錮遂次之又欲以章惇子為第三哲宗命再讀安國策親擢為第三昌言新淦人仕至工部侍郎張邦昌之僣昌言為事務官既又改名善言以避邦昌名南都中興昌言已死遂追貶觀其進身可以占終矣唐小説辨疑志載明皇時薑撫先生不知何許人也常著道士衣冠自云年已數百歲持符籙兼有長年之藥度世之術有荆巖者頗通南北史問撫何朝人也撫曰梁朝人也巖曰梁朝絶近先生亦非長年之人不審先生梁朝出仕為復隱居撫曰吾為西涼州節度巖曰何得誑妄上欺天子下惑世人梁朝在江南何處得西涼州只有四平四安四鎮四征將軍何處得節度使撫慙恨數日而卒蔡絛鐵圍山叢談政和間有處士王卓者亦遭遇時主自言五百歲矣人視之若不過七八十歲容狀光澤頗挾容成術無它異也魯公稍異之一日魯公命吾延卓坐吾詢其迹則曰生隋末唐李績征髙麗嘗作禆將因擅縱降卒數十被黥配之五嶺南繇是遇異人授以不死方曾不一瞬間忽至今矣吾問還識狄梁公否卓曰識也感它狄相公封卓為白雲先生又問當開元天寶間明皇帝好道而方士輩出先生出乎曰卓時反不出問何故則曰卓時與羅家爭氣意自不喜出耳羅蓋公逺也遂歷問唐諸帝武后及名臣之情狀則或合或不合又言當肅宗時卓始一出亦蒙封號吾問果爾則必識李輔國輔國狀若何卓曰正得輔國見愛而封輔國面大且方美須髯也吾笑曰先生敗矣二事正堪作對信乎作偽之難也撫唐史有傳亦言其妄然不及此云葛文康評古謂漢文帝改後元年景帝又改中元後元年武帝屢更年號亦有後元不知當時何所據而分中與後謂之後則疑若有極乃不諱避何邪將當時有先知之讖邪余謂不然漢之諸帝不過改元年爾後人因其有二元則别以為後因其有三元則復冠以中非當時本稱也武帝雖屢更年號偶最後不曾命名獨稱元年後人因其崩也亦以後稱焉耳惟東都建武中元恐是當時所命也西漢諸帝多自立陵廟名後世不復然至於及其生而自命以某祖某宗而使萬世不祧者古今所無也惟於魏明帝見之孫盛譏之是矣彼謂顧成之廟稱為太宗者臣下假設之辭耳非此之比也徐陵鴛鴦賦云山雞映水那相得孤鸞照鏡不成雙天下真成長會合無勝比翼兩鴛鴦黃魯直題畫睡鴨曰山雞照影空自愛孤鸞舞鏡不作雙天下真成長會合兩鳬相倚睡秋江全用徐語點化容齋隨筆謂魯直末句尤精工余幼時不能解每疑鴛鴦可言長會合兩鳬則聚散不常何可言長會合後乃悟魯直所謂長會合特指畫者耳新唐書進表謂其事則增於前其文則省於舊夫為文紀事主於辭達繁簡非所計也新唐書之病正坐此兩語前輩議之者多矣晉張輔云司馬遷敘三千年事惟五十萬言班固敘二百年事乃八十萬言以此為遷固優劣殊不思司馬子長追述上世故不可得而詳班孟堅紀録近事有不容於略春秋傳所謂所見異辭所聞異辭所傳聞異辭正謂是也洪文敏論史記衛青傳書校尉李朔校尉趙不虞校尉公孫戎奴各三從大將軍獲王以千三百户封朔為涉軹侯以千三百户封不虞為隨成侯以千三百户封戎奴為從平侯前漢書但云校尉李朔趙不虞公孫戎奴各三從大將軍封朔為涉軹侯不虞為隨成侯戎奴為從平侯比於史記五十八字中省二十三字然不若史記為朴贍可喜又論檀弓紀石祁子事云石駘仲卒有庶子六人卜所以為後者曰沐浴佩玊則兆五人者皆沐浴佩玊石祁子曰孰有執親之喪而沐浴佩玊者乎不沐浴佩玊謂今之為文者不然必曰沐浴佩玊則兆五人者如之祁子獨不可曰孰有執親之喪若此者乎似亦足以盡其事然古意衰矣此論得之崇仁吳德逺沆環溪詩話載其少時謁張右丞右丞告之曰杜詩妙處人罕能知凡人作詩一句只説得一件物事多説得兩件杜詩一句能説得三件四件五件常人作詩但説得眼前逺不過數十里杜詩一句能説數百里能説兩州軍能説半天下能説滿天下此其所以為妙且如重露成涓滴稀星乍有無也是好句然露與星各只是一件事如孤城返照紅將斂近市浮煙翠且重亦是好句是有孤城也有返照也即是兩件事又如鼉吼風奔浪魚跳日映山有鼉也風也浪也即是一句説三件事如絶壁過雲開錦繡疏松夾水奏笙簧即是一句説四件事至如旌旗日暖龍蛇動宫殿風微燕雀髙即是一句説五件事唯其實是以健若一字虛即一字弱矣公但按此法以求前人即漸難為詩吳又問如何是説眼前事以至滿天下事右丞云如獨鶴不知何事舞飢烏似欲向人啼只是説眼前所見如藍水逺從千澗落玊山髙並兩峯寒即是説數十里內事如三峽樓臺淹日月五溪衣服共雲山即是一句説數百里內事至如浮雲連海岱平野入青徐即是説兩州軍如吳楚東南坼即是一句説半天下至乾坤日夜浮即是一句説滿天下吳因取前輩之詩參而考之謂東坡惟有美堂一篇最工然天外黑風吹海立浙東飛雨過江來止是一句能言三件事如令嚴鐘鼓三更月野宿貔貅萬竈煙是一句能言四件事如通印子魚猶帶骨披綿黃雀尚多脂鶴間雲作氅駝卧草埋峯每句亦不過三物如酒醒風動竹夢斷月窺樓深谷留風終夜響亂山銜月半床明風花誤入長春苑雲月長臨不夜城雲煙湖寺家家鏡燈火沙河夜夜春則似三物而不足至如峯多巧障日江逺欲浮天翠浪舞翻紅䆉稏白雲穿破碧玲瓏葉厚有稜犀甲健花深少態鶴頭丹等句不過用二物矣山谷則有數聯合格如輕塵不動琴橫膝萬籟無聲月入簾飯香獵户分熊白酒熟漁家擘蟹黃苦楝狂風寒徹骨黃梅細雨潤如酥皆是一句能言三件事如河天月暈魚分子槲葉風微鹿養茸桃李春風一杯酒江湖夜雨十年燈即是一句能言四件事至荆公則合格者稍多如帚動川收潦靴鳴海上潮已無船舫猶聞笛逺有樓臺只見燈山月入松金破碎江風吹水雪崩騰陽浮樹外蒼江水塵漲原頭野火煙即每句皆能道三件事以至廟堂生莽卓巗穴死伊周和風滿樹笙簧雜霽色兼山粉黛重坐見山川吞日月杳無車馬送塵埃霽分星斗風雷靜涼入軒窗枕簟間即是一句能言四件事然竟無一句能用五物者至用半天下滿天下之説求之尤未見其有也然後知詩道之難如此而古今之美備在杜詩無復疑矣此論尤異以此論詩淺矣杜子美之所以髙於衆作者豈謂是哉若以句中事物之多為工則必皆如陳無已桂椒柟櫨楓柞樟之句而後可以獨步雖杜子美亦不容專美若以乾坤日夜浮為滿天下句則凡句中言天地華夷宇宙四海者皆足以當之矣何謂無也張輔喜司馬子長五十萬言紀三千年事張右丞喜杜子美一句該五物識趣正同故併録之邵伯溫聞見録載康節先生治平間與客散步天津橋上聞杜鵑聲慘然不樂曰洛陽舊無杜鵑今始至不二年上用南士為相多引南人專務變更天下自此多事矣客曰聞杜鵑何以知此曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也與峕按康節首尾吟其一云堯夫非是愛吟詩詩是堯夫訪友時青眼主人偶不在白頭老叟還空歸幾家大第橫斜照一片殘春啼子規獨往獨來還獨坐堯夫非是愛吟詩疑亦此意也古今詠史詩求其議論精當康節先生題淮隂侯廟十篇可以為冠讀者當自知之一身作亂冝從戮三族全夷似少恩漢道是時初雜霸蕭何王佐殆非尊據立大功非不智復貪王爵似專愚造成四百年炎漢才得安寧反受誅生身既得逢真主立事何須作假王誰謂禍胎從此始不宜回首怨髙皇一時韓信為良犬千古蕭何作霸臣彼此並干名教罪罪猶不逮謂斯人韓信事劉元不叛蕭何惑漢竟生疑當初若聽蒯通語髙祖功名未可知雖則有才兼有智存亡進退處非真五湖依舊煙波在范蠡無人繼後塵若非韓信難除項不得蕭何莫制韓天下須知無一手茍非髙祖用蕭難漢家基定議功勳異姓封王有五人不似淮隂最雄傑敢教根固又生秦韓信恃功前慮寡漢皇負德尚權安幽囚必欲擒來斬固要加諸甚不難若履暴榮須暴辱既經多喜必多憂功成能讓封王印世世長為列土侯首卷書王平甫所云花蘂宫詞三十二首今考王恭簡續成都集記才二十八首盡筆於此庶真贋了然五雲樓閣鳯城間花木長新日月間三十六宫連內苑太平天子坐崑山會真廣殿約宫墻樓閣相扶倚太陽淨甃玊階橫水岸御爐香氣撲龍牀龍池九曲逺相通楊栁絲牽兩岸風長似江南好春景畫船來去碧波中東內斜將紫禁通龍池鳯苑夾城中曉鐘聲斷嚴妝罷院院紗窗海日紅殿名新立號重光島上亭臺盡改張但是一人行幸處黃金閣子鎖牙牀安排諸院接行廊水檻周回十里強青錦地衣紅繡毯盡鋪龍腦鬱金香夾城門與內門通朝罷巡逰到苑中每日日髙祗候處滿堤紅艷立春風厨船進食簇時新侍坐無非列近臣日午殿頭宣索膾隔花催喚打魚人立春日進內園花紅蘂輕輕嫩淺霞跪到玊階猶帶露一時宣賜與宫娃三面宫城盡夾墻苑中池水白茫茫亦從師子門前入旋見亭臺繞岸傍離宫别院繞宫城金板輕敲合鳯笙夜夜月明花樹底傍池長有按歌聲御製新翻曲子成六宫才唱未知名盡將觱篥來抄譜先按君王玊笛聲旋移紅樹劚青苔宣使龍池再鑿開展得緑波寬似海水心樓殿勝蓬萊太虛髙閣凌波殿背倚城墻靣枕池諸院各分娘子位羊車到處不教知修儀承寵住龍池掃地焚香日午時等候大家來院裏看教鸚鵡念新詩才人出入每相隨筆硯將行繞曲池能向彩箋書大字忽防御製寫新詩六宫官職總新除宫女安排入畫圖二十四司分六局御前頻見錯相呼春風一靣曉糚成偷折花枝傍水行却被內監遙覷見故將紅豆打黃鶯梨園弟子簇池頭小樂擕來候燕逰旋炙銀笙先按拍海棠花下合梁州殿前排燕賞花開宫女侵晨探幾回斜望花開遙舉袖傳聲先喚近臣來小毬場近曲池頭宣喚勳臣試打毬先向畫廊排御幄管絃聲動立浮油供奉頭籌不敢爭上棚專喚近臣名內人酌酒才宣賜焉上齊呼萬歲聲殿前宫女揔纎腰初學乘騎怯又嬌上得馬來才似走幾回拋鞚把鞍橋自教宫娥學打毬玊鞍初跨桞腰柔上棚知是官家認遍遍長贏第一籌翔鸞閣外夕陽天木影花光水接連望見內家來住處水門斜過罨樓船內人追逐採蓮時驚起沙鷗兩岸飛蘭掉把來齊拍水並船相鬬濕羅衣新秋女伴各相逢罨畫船飛别浦中笑折荷花半歌舞夕陽斜照滿衣紅月頭支給買花錢滿殿宫娥近數千遇著唱名多不應含羞走過御牀前任土作貢三代而下未之或廢時有損益而已髙宗建炎三年始詔除金銀匹帛錢榖餘悉罷貢盛德事也禹貢以來歷代史志及地里之書但載土貢之目而不書其數惟元豐九域志為詳嘗撮一歲所貢凡為金二十四兩登一十兩利五兩萬象融各三兩麩金五十五兩金鐃各一十兩嘉六兩眉雅簡資各五兩衡昌龍各三兩銀四百五兩桂楊桂各五十兩鄂雍各三十兩􅰞賀封端新康南恩梅容昭梧藤龔潯貴栁宣檻白廣瓊昌化各一十兩賔化髙鬱林萬安各五兩銅鐵一十斤利錦三匹成都白縠一十匹襄隔織一十八匹泰一十匹洋八匹絁七十五匹汝一十五匹潁棣保定安肅陜威勝各一十匹花絁一十匹祁綜絲絁二十匹濰綾一百四十五匹杭三十匹蔡定各一十匹淄隨潤明秀江陵澧各一十匹綿五匹花綾一十匹兖白花綾一十匹梓綜絲綾一十匹遂雙絲綾一十匹徐方紋綾三十匹開封仙紋綾五十匹青三十匹濰二十匹摴蒱綾二十匹遂蓮綾一十匹閬越綾二十匹越羅七十匹真定三十匹定二十匹潤彭各一十匹花羅六匹成都春羅四匹蜀單絲羅一十匹蜀紗四十匹相廬常大平各一十匹方文紗三十匹開封茜緋花紗一十匹越輕容紗五匹越紬一百四十五匹洺二十匹陳汝各一十五匹大名徐潁博雄永寧廣信陜懷安各一十匹達五匹花紬一十匹大名綿紬五十匹簡二十匹大名一十匹渠巴蓬忠各五匹絹六百七十匹隨滑贏各三十匹應天冀德德衛深亳各二十匹陳一十五匹密齊淮陽徐曹卿濮唐潁昌真滄拽霸永靜乾寧信安相邢趙保順安渭平定岢嵐寧化保德宿海泗滁廬濠無為臨江為建昌涪昌雲安南平韶循南雄各一十匹廣安五匹班白絹三匹誠布一十五匹鼎一十匹梅五匹絲布二十匹邛一十匹果一十匹紵布一百七十五匹信陽楚和吉筠興國南安栁江陵安鼎嶽歸漢綿邵武英各一十匹房五匹白紵布一百六十五匹舒湖虔各二十匹郢蘄黃常睦宣歙袁道連各一十匹開五匹髙紵布一十匹成都斑布一十匹榮葛布二百三十五匹洪撫渾各三十匹蘇二十匹隨夀光吉永全普戎瀘冨順泉興化各一十匹渝五匹蕉布一十五匹泉一十匹潮五匹紅花蕉布三十匹福練七十匹建五十匹杞鼎各一十匹毛毼一十五段熙一十段保安五段紫茸毛毼一十段涇綿一千一百兩齊潁莫衛趙婺處衢梁山泉興化各一百兩氈三十領慶二十領豐一十領白氈三十領鎮戎二十領恩一十領紫茸氈四領慶鞾氈一十領京兆鞾皮二十張同獐鹿皮三百一十張海三百張通一十張鮫魚皮二十六張台漳各一十張溫五張潮一張龜殼二十枚廣水馬二十枚廣鼊皮三十一張廣翡翠毛二十枚欽席一百七十領常二十領澶秦隴蘇各二十領京兆鄜寧坊鳯翔汾各一十領藨席二十領開封一十領潁昌一十領莞席一百領揚簟四十一領永靜蘄睦饒各一十領澧一領藤簟二十領廣漆器五十事湖三十事襄二十事瓷器三百一十事河南二百事耀越各五十事邢一十事石器二十事登一十事萊一十事水晶器一十事信藤器二十事象一十事賔一十事藤盤一靣循藤箱一枚惠栁箱一十枚滄銅鑑一十面太原青銅鑑二十面揚火筯五十對邠剪刀五十枚邠筆一千管江寧五百管宣五百管墨三百枚兖潞維各一百枚硯四十枚虢二十枚寧端各一十枚紙四千張越歙池各一千張貞溫各五百張雜色箋五百張成都蠟燭九百五十條鳯翔三百條汀二百條成鳯晉綘各一百條階五十條花蠟燭一百條鄧燕脂一十斤興元槵子數珠一十串象斑竹一十枝雷解玊砂一百五十斤邢一百斤欣五十斤金漆三十斤台弓弦麻二十斤坊鰾膠一十斤通甲香二十七斤漳惠各一十斤