body:
  text: 賔退録卷六宋趙與峕撰路德延處朱友謙幕府作孩兒詩五十韻以譏友謙本朝張師錫追次其韻賦老兒詩一篇二詩曲盡老幼之情狀張詩用韻妥帖不類次韻者尤為難能今兩録之孩兒詩曰情態任天然桃紅兩頰鮮乍行人共看初語客多憐臂膊肥如瓠肌膚軟勝綿長頭才覆額分角漸垂肩散誕無塵慮逍遙占地仙排衙朱閣上喝道畫堂前合調歌楊栁齊聲踏採蓮走堤衝細兩奔巷趂輕煙嫩竹乘為馬新蒲掉作鞭鶯雛金鏇繫猧子綵絲牽擁鶴歸晴島驅鵝入暖泉楊花爭㺯雪榆葉共收錢錫鏡當胸掛銀珠對耳懸頭依蒼鶻裹袖學柘枝揎酒殢丹砂暖茶催小玉煎頻邀籌箸插時乞繡針穿寶篋拏紅豆粧奩拾翠鈿短袍披按褥尖帽戴靴氊展畫趨三聖開屏笑七賢貯懷青杏小埀額緑荷圓驚滴沾羅淚嬌流汚錦涎倦書饒婭姹憎藥巧遷延㺯帳鸞綃映藏衾鳳綺纒指敲迎使鼓箸撥賽神絃簾拂魚鉤動箏推雁柱偏棊圖添路畫笛管缺聲鐫惱客初酣睡驚僧半入禪尋蛛窮屋瓦探雀遍樓椽拋果忙開口藏鉤亂出拳夜分圍榾柮朝聚打鞦韆折竹裝泥燕添絲放紙鳶互誇輪水磑相教放風旋旗小裁紅絹書幽截碧箋逺鋪張鴿網低控射蠅弦吉語時時道謡歌處處傳匿窗肩乍曲遮路臂相連鬭草當春徑爭毬出晚田栁傍慵獨坐花底困橫眠等鵲潛籬畔聽蛩伏砌邊旁枝招粉蝶隈樹捉鳴蟬平島誇蹻上層崖逞捷緣嫩苔車跡小深雪履痕全競指雲生岫齊呼月上天蟻窠尋徑斸蜂穴繞階填樵唱回深嶺牛歌下逺川壘柴為屋木和土作盤筵險砌髙臺石危跳峻塔甎忽升鄰舍樹偷上後池船項槖稱師日甘羅作相年明時方在德戒爾減狂顚老兒詩曰鬢髮盡皤然眉分白雪鮮周遮延客話傴僂抱孫憐無病常供粥非寒亦服綿假溫衾擁背借力杖搘肩貌比三峯客年過四皓仙喚方離枕上扶始到門前每愛烹山茗常嫌飣石蓮耳聾如塞纊眼暗似籠煙宴坐羸憑几乘騎困嚲鞭頭搖如轉旋唇動若抽牽骨冷愁離火牙疼怯潄泉形骸將就木囊槖尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰懶繫濯手袖慵揎擡舉衣頻換扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕牀遣厚鋪氊琴聽憐三樂圖張笑七賢看嫌經字小敲喜磬聲圓食罷羮流袂杯餘酒帶涎樂來須遣罷醫到久相延裹帽縱橫掠梳頭取次纒長吁思往事多感聽哀絃氣注腰還重風牽口更偏墓松先遣種志石預教鐫客到唯求藥僧來忽問禪養茶懸竈壁曝艾曬簷椽怒僕空瞪眼嗔童謾握拳心驚嫌蹴踘腳軟怕鞦韆局縮同寒狖摧豗似餓鳶觀瞻多目眩舉動即頭旋女嫁求紅燭男婚乞綵箋已聞頒几杖寧更佩韋弦賔客身非與兒孫事已傳養和屏作伴如意拂相連久棄登山屐唯存負郭田呻吟朝不樂展轉夜無眼呼稚臨牀畔看書就枕邊冷疑懷貯水虛訝耳聞蟬束帛非無分安車信有緣伏生甘坐末絳老讓行先拘急將風夜昏沈欲雨天雞皮塵屢積齯齒食頻填每憶居即署常思釣渭川喜逢迎佛㑹羞赴賞花筵徑狹容移檻階危索減甎好生焚鳥網惡殺拆漁船既感桑榆日常嗟蒲栁年長思當弱冠悔不賸狂顚書畢回思少小嬉戲之時恍如昨日今年踰三十駸駸將入老兒詩之境矣讀之亦可以自警云前詩第四十二韻押全字後詩乃押先字恐誤又養和屛作伴屛字可疑寓言以貽訓誡若栁子厚三戒鞭賈之類頗似以文為戲然亦不無補於世道吾閲近世文集得二文焉朱希真敦儒東方智士說蕭東夫德藻吳五百是也朱之文曰東方有人自號智士才多而狂心凡古昔聖賢與當世公卿長者皆摘其短闕而非笑之然地寒力薄終歲不免飢凍里有富人建第宅甲其國中車馬奴婢鐘鼓帷帳惟備一旦富人召智士語之曰吾將逺游今以居第貸子凡室中金寶資生之具無乏皆聽子用不記期年還則歸我富人登車而出智士杖策而入僮僕妓妾羅拜堂下各效其所典簿籍以聽命號智士曰假公智士因遍觀居第富實偉麗過王者喜甚忽更衣東走圊仰視其舍卑狹俯閲其基湫隘心鬱然不樂召綱紀僕讓之曰此地髙廣而圊不稱僕曰惟假公教智士因令徹舊營新狹者廣之庳者增之曰如此以當寒暑如此以蔽風雨既藻其梲又丹其楹至於聚籌積灰扇蠅攘蛆皆有法度事或未當朝移夕改必善必竒智士躬執斤帚與役夫雜作手足瘡繭頭蓬靣垢晝夜廢眠食忉忉焉惟恐圊之未美也不覺閲歲成未落也忽閽者奔告曰阿郎至矣智士倉皇棄帚而趨迎富人於堂下富人勞之曰子居吾第樂乎智士恍然自失曰自君之出吾唯圊是務初不知堂中之溫密别館之虛涼北榭之風南樓之月西園花竹之勝吾未嘗經目後房歌舞之妙吾未嘗舉觴蟲網琴瑟塵棲鐘鼎不知歲月之及子復歸而吾當去也富人揖而出之智士還於故廬且悲且嘆悒悒而死市南宜僚聞而笑之以告北山愚公愚公曰子奚笑哉世之治圊者多矣子奚笑哉蕭之文曰吳名憃南蘭陵為寓言勒之曰淮右浮屠客吳日飲于市醉而狂攘臂突市人行者皆避市卒以聞吳牧牧録而械之為符移授五百使護而返之淮右五百詬浮屠曰狂髠坐爾乃有千里役吾且爾苦也每未晨蹴之即道執撲驅其後不得休夜則縶其足至奔牛埭浮屠出腰間金市斗酒夜醉五百而髠其首解墨衣衣之且加之械而縶焉頽壁而逃明日日既昳五百乃醒寂不見浮屠顧壁已頽曰嘻其遁矣既而視其身之衣則墨驚循其首則不髮又械且縶不能出户大呼逆旅中曰狂髠故在此獨失我耳客每見吳人輒道此吳人亦自笑也千巖老人曰此殆非寓言也世之失我者豈獨吳五百哉生而有此我也均我是不為榮悴有加損焉者也所寄以見榮悴乃皆物外非所謂儻來者邪曩悴而今榮儻來集其身者日以盛而顧揖步趨亦日隨所寄而改曩與之處者今視之良非昔人而其自視亦殆非復故我也是其與吳五百果有間否哉吾故人或駸駸華要當書此遺之二文朱尤屬意髙逺世之人不能窮理盡性以至於聖賢之樂地而區區馳逐末務以終其身者皆東方智士之流也余亦懼夫流而至於此也讀之竦然為之汗下饒德操祝髮後有與胡少汲直孺小簡云如璧再啓少汲器博望重雖欲與官職辭而官職迫之不置然安時聽命可也時命之來亦非己力所能勝己力所能勝亦不可不勝者獨聲色一事耳大抵官職移人如酒漸多則難制方飲酒時有所畏者自非狂夫則酒雖多不致於犯禮少汲天資近道如楞嚴圓覺維摩宜少汲所甚畏者不可令去几案間庶幾濯優曇於烈火也漸貴矣恐漸不聞此語而我漸不敢作此語亦恐漸不喜此語及此時汲汲早獻林下之芹止如是耳曾端伯慥以所編百家詩選遺孫仲益仲益復書云蒙馳賜百家新選一集發函開讀每得所未聞則拊髀爵躍讀之惟恐盡也歐陽公集古録云物常聚於所好而得於有力之强如好之而無力有力而不好皆莫能致也宋興二百年宗工巨儒騷人墨客專門名家大篇短章或膾炙士大夫之口或淪廢於兵火幾亡而僅存搜攬亦略盡矣而詩引所載多者數百言少者數十言其人出處大致詞格髙下盛德之士髙風絶塵師表一世放臣逐客興微託逺屬思千里與夫山鑱冡刻方言地志怪竒可喜之詞羣嘲聚訕戲笑之談靡不畢載集古録又云惟世之所貪者無欲於其中然後能一其所好豈不信矣夫覿竊讀諸引之後其詩舊所見不復讀讀未見者每遇佳處或一再讀或三復而不能休不謂投老殘年獲睹竒勝幸甚過望不可言也覿學迂才下為世畸人區區小技如臘鼠然不敢出鄭國尺寸之地比讀新著而私意粗亦有合者秦少游云曾子固文章妙絶古今而有韻者輒不工此語一出天下遂以為口實南豐作李白詩引以謂閎肆瑰偉非近世騷人所可及而連類引義中法度者寡荆公屢稱郭功父詩而南豐不謂然功父疑之荆公曰豈非子固以謂功父天才超逸更當約以古詩之法乎南豐論詩如此如兵間一詩指徐德占論交一詩指吕吉甫又有黃金顔揚諸詩皆卓然有濟世之用而世人便謂不能詩覿所以不喻其言也荆公竹詩人言直節生來瘦自許髙才老更剛雪詩平治險穢非無德潤澤焦枯實有才送李璋下第才如吾子何憂失命屬天公不可猜世人傳誦然非佳句公詩至知制誥乃盡善歸蔣川乃造精絶其後再送李璋下第和吳仲卿雪詩比少作如天淵相絶矣白公詩所謂辭達大抵能道意之所欲言者蘇黃門詩已不逮諸公北歸後效白公體益不逮惟四字詩最善張文潛晚年詩不逮前作意謂亦效白公詩者公述潘邠老言文潛晚喜白公詩信矣如所料也東坡論陶詩精能之至乃造平淡如佛說蜜中邊皆甜若中與邊皆枯淡亦何用陶詩外枯而中腴若淡而實美也公謂徐師川晚年務造平淡終不如少年精巧蓋平淡不可為水落石出自見涯涘非積學之至不能到也吕居仁作江南宗派固有次第陳無己本學杜子美後受知於曾南豐自言向來一瓣香敬為曾南豐非其派也靖康末吕舜徒作中憲居仁遇師川於寶梵佛舍極口詬罵其翁於廣坐中居仁俯首不敢出一語故於宗派貶之於祖可如壁之下師川固當不平然惠洪僞作魯直贈詩云氣爽絶類徐師川師川喜以為是不免與惠洪為類此又不可曉者冷齊夜話載秀老一事覿在江西時惡其狂誕無稽坐客皆憮然此僧中奴固不以笞罵為辱東坡橄欖詩云已輸崖蜜十分甜惠洪以崖蜜為櫻桃又有俗子假東坡名注杜詩云金城土酥靜如練為蘆蔔根者東坡地黃詩云崖蜜助甘冷山薑發芳辛製地黃法當用薑與蜜而用櫻桃可乎黃師是守泗時以酥酒遺東坡答詩云關右土酥黃似酒揚州雲液却如酥謂土酥為蘆蔔根可乎公著論斥其妄良有益於後人耳目也覿每觀公叙諸詩詞句溫麗紀次詳實尊賢樂善得詩人本意歎仰之餘又見曾存之朝無咎廖明略諸公已推重於幼學之初而一時名勝皆其儔匹然後知公致力於斯文久矣如曹元寵米元暉殆是子美詩中黃四娘者邪然元寵詩殊有可觀若都都平丈我又待入紅窗迥矣聊發千里一笑覿自拜賜凡六日讀盡所著五十九卷與拾遺詩話一卷而後修書拜送使者尚當細讀别具記仲益此書發明甚多今人遺以書籍安肯即讀雖讀亦必不能留意如此前輩之風何可多得元寵名組嘗賦紅窗迥百餘篇皆嘲謔之詞故掩其文名世傳俚語謂假儒不識字者以論語授徒讀郁郁乎文哉作都都平丈我詩選載元寵題梁仲叙所藏陳坦畫村教學詩云此老方捫虱衆雛亦附火想見文字間都都平丈我仲益故云端伯觀詩有百家詩選觀詞有樂府雅詞稗官小說則有類說至於神仙之學亦有道樞十巨編蓋矜多衒博欲示其於書無所不讀於學無所不能故未免以不知為知詩選去取殊未精當前輩多議之仲益所稱南豐兵間論交黃金顔揚諸篇及蘇黃門四字詩無一在選中者而反録都都平丈我之句答書及此亦因以針之也顔淵子夏為地下修文郎陶𢎞景為蓬萊都水監馬周為素雪宫仙官李長吉記白玉樓其說荒唐不可究詰然近世此類甚多見於傳記班班可考大抵名人才士間鍾異稟世不多得使無神仙則已設或有之非斯人之徒其孰能當之苐怪神之事聖人不語六合之外存之可也石曼卿卒後其故人有見之者云恍惚如夢中言我今為仙也所主者芙蓉城慶厯中有朝士晨赴起居道見美婦三十餘行前丁觀文度按轡繼之而去朝士問之最後一人答曰諸女御迎芙蓉館主也時丁在告頃之聞其卒右侍禁孫勉監元城掃有巨黿穴一掃下掃多墊陷伺其出射殺之後晝臥夢吏來逮行若百里見道左宫闕甚壯問吏何所曰紫府真人宫也真人為誰曰韓忠獻也勉私念乃韓公故吏祝門吏入見之望韓公坐殿上衣冠若神仙侍立皆碧衣童子勉再拜以情禱焉公遣之歸遂寤王平甫熙寧癸丑直宿崇文館夢有人邀至海上見海中宫殿甚盛其間作樂題其宫曰靈芝宫邀者欲與俱往一人隔水止之曰時未至且令去他日當迎之恍然夢覺時禁中已鐘鳴平甫頗自負為詩記之曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鐘來夜半時後四年平甫病卒其家哭訊之曰君嘗夢往靈芝宫信然乎當以兆我是夕暮奠若有聲音接於人者其家復卜以錢卜曰然吕獻可在安州一日坐小軒因合目見碧衣童云玉帝南遊炎洲召子隨行糾正羣仙炎洲苦熱賜子清涼丹一粒吕拜而吞之若氷雪然自知不久於世後朱明復見吕跨玉角青鹿於湘江道中金甲吏從數百人劉景文知欣州一日謂一曹掾曰天帝即召君吾且繼往未幾掾無病而逝景文亦繼亡經夕蹶然而蘇索筆作三詩有中宫在天半其上乃吾家及仙都非世間天神繞樓殿等語黃伯思字長睿邵武人自稱雲林子尚書右丞履之孫登進士第仕至祕書郎博學能文好仙佛之說政和七年在京師夢人告子非久在人間上帝有命典司文翰明年二月果卒李伯紀銘其墓略曰白玉樓成上帝有詔往司文翰脫屣塵淖蓋紀此事陳伯修師錫宣和三年寓居京口自稱閒適先生一日晝寢夢至帝所如人間上殿之儀帝曰卿平生所上章疏可叙録進呈一天官引至廊廡間帷帳甚設几上有筆墨硯石皆精妙可玩傍有大帙用青綾裝飾信手運筆捷疾如神疇昔所上者不遺一字帝批覽再三晬顔甚喜諭㫖曰已於第六等授卿官即下殿謝恩聞金鐘玉磬之聲競作乃寤以告其子且云豐相之臨終得夢亦如是俄命駕遍别知舊白府丐致仕夜過半命其子舉左足壓右足手結彌陀印端坐而絶後七日一僧云夜宿瓜州夢官人服銀緋跨馬導從數十履江水如平地心異之問為誰從者曰陳殿院赴召也黃冕仲挽詩有凌波應作水中仙之句張子韶云不須更草玉樓賦已作神仙第六人皆謂此李莊簡南遷其子孟博卒于瓊州先是數月孟博夢至一所海山空濶樓觀特起雲霄間有軒榜曰空明先世諸父環坐其中指一席曰留以待汝遂寤臨終雲氣起於寢冠服宛然自雲中冉冉升舉瓊人悉見之孟博苦學有文紹興五年進士第三人及第莊簡有詩悼之云脫屣塵寰委蛻蟬真形渺渺駕非煙丹臺路杳無歸日白玉樓成不待年宴坐我方依古佛空行汝去作飛仙恩深父子情難割淚滴千行到九泉朱希真夢記略云紹興戊寅除夜體中不佳三更方得睡夢至一山館與一客行至門外望山下一居舍甚瀟灑客指曰此某人居也盍往訪之乃同至其家柴扉茅舍門前張一畫圖作一仙人乘雲騰空下臨海山唐人畫也俄而主人出竹冠草履握豫手大笑如舊相識引入至一小閣又進登一閣稍大閣中皆陳列法書圖畫大閣北壁蓋其人自畫山林巖石隱逸之趣其上作雲煙出沒濃淡雲中隱隱有章草細字可讀云吾初東遊至黃河向河再拜飲河水一杯而渡至某處見某人授易書某處見某人授種蒔法至某處見某人授法乃歸復至黃河復再拜飲河水一杯欲渡大風河浪汹湧衆不敢登舟豫亂流而濟至家始營小閣日與客飲酒閣破二作三間酒器用鐵鐺木杓磁杯已而少有餘復建大閣他日又有餘復買銀作鐺杯無日不留客客必劇飲飲必醉醉必睡一睡或數日不醒也後字雜雲煙不可讀矣與豫語極朴質間及道理則𤣥妙髙逺其人風姿蓋神仙真人之流獨與豫慷慨劇談坐間先有數客不復與語豫亦連酌數杯酒味非人間麴糵可及歡飲方狎忽驚起索燈火目想心思縱筆為記次日己卯歲旦子孫環侍朱出此記示之且云所遊甚樂悔不便為住計復八日又自云好去好去自有快樂三更初端坐啓手足神色不亂寂然而逝七日方斂舉體柔軟氣貌如生韓公事見劉斧青瑣髙議吕公事見斧翰府名談斧著書多誕妄故觀者例不敢信石丁二事東坡芙蓉城詩已用之靈芝宫東坡亦記其事若劉若黃若陳若李若朱則又耳目相接皆可信不誣唐白樂天亦有詩云近有人從海上回海山深處見樓臺中有仙龕虛一室多傳此待樂天來夷堅乙志又載方朝散為玉華侍郎事甚詳方之名不著於世故不録真誥丹臺録諸書所載如武王發為北斗君召公奭為南明公賈誼為西門都禁郎溫太真為監海開國伯魏武帝為北君太傅孔文舉為後中衛大將軍陶侃為西河侯秦始皇為北帝上相周公旦為北帝師伯夷叔齊為九天僕射墨翟為太極仙卿莊周為太𤣥博士孔子為元宫仙之類凡數十人不可悉書古今聖賢幾無遺者豈盡如其說乎富鄭公奉使契丹其主言欲舉兵公曰北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝羣臣爭勸舉兵者此皆其自謀非國計也勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟是時語録傳於四方蘇明允讀至此曰此一段議論古人有之否東坡未十歲在傍對曰記得嚴安上書云今徇南夷朝夜郎略薉州建城邑深入胸奴燔其龍城議者美之此人臣之利非天下之長䇿也正是此意明允以為然洪文敏又記魏太武時南邊諸將表稱宋人大嚴將入寇請先其未發逆擊之魏公卿皆以為當崔伯深曰朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲美女珍寶南邊諸將聞而慕之亦欲南鈔以取資財皆營私計為國生事不可從也魏主乃止其論亦然余謂嚴崔之說皆陳於其君非若富公以和戰利害别白於異域而能見聽獨唐鄭元璹使突厥謂頡利曰今掠資財劫人口皆入所部可汗一不得豈若仆旗接好則金玉重幣一歸可汗頡利當其言時自將攻太原遽引還正與富公之事合文敏偶忘之何邪然富公豈蹈襲它人之語者蓋理之所在古今所同推誠以告之雖蠻貊之邦行矣容齊五筆載饒州慶元四年九月十四日嚴霜連降晚稻未實者皆為所薄不能復生諸縣皆然有當産者訴于郡縣郡守孜孜愛民有意蠲租然僚吏多云在法無此又云九月正是霜降節不足為異按白樂天諷諫杜陵叟一篇九月霜降秋早寒禾穗未熟皆青乾長吏明知不申破急斂暴征求考課此明證也豈非昔人立法之初所謂早霜之類非如水旱之田可以稽考懼貪民乘時或成冒濫故不輕啓其端今日之計固難添創條式但凡有災傷出於水旱之外者專委良守令推而行之則實惠及民可以救其流亡之禍仁政之上也此皆洪說余按北史盧勇傳山西霜儉運山東租輸皆令實載違者罪之唐馬周奏疏云往貞觀初率土霜儉一匹絹才易斗米而天下帖然者百姓知陛下憂憐之故人人自安無謗讟也北齊書隋書亦有直云霜旱者由是推之唐初以前必皆有蠲租故事中世方不然又如其名為霜儉霜旱有能援以言上聖明之朝當無不從也後漢以六曹尚書并令僕為八座魏以五曹尚書二僕一令為八座唐太宗嘗歷尚書令人臣不敢居此官職林猶謂唐與隋同竇鞏新唐書音訓則謂唐以兩僕射六尚書為八座髙承事物紀原又謂隋唐至今令僕為宰相故六尚書及左右丞為八座未知孰是青箱雜記載李太伯一絶云人言落日是天涯望極天涯不見家已恨碧山相掩映碧山還被暮雲遮識者曰此詩意有重重障礙李君其不偶乎後果如其言吾族人紫芝師秀亦嘗賦一絶云數日秋風欺病夫盡吹黃葉下庭蕪林疏放得遙山出又被雲遮一半無氣象略相似僅脫選而卒何月湖尚書少時登髙峯壇有天風近轉清地髙日難晚之句林黃中侍郎見之即知其異日必貴且夀視前二詩不侔矣賔退録卷六
