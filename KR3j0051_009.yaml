body:
  text: 賔退録卷九宋趙與峕撰詩誕彌厥月誕大也朱文公則以為發語之辭世俗誤以誕訓生遂有降誕慶誕之語前輩辨者多矣書曰誕膺天命誕亦大也范曄贊光武乃有光武誕命之語尤不可曉殤帝紀云誕育百餘日亦誤㓂恂自潁川太守徙汝南又入為執金吾會潁川盜起光武將親征隗囂欲復使出守潁川從駕至郡盜賊悉降遂已百姓遮道曰願從陛下復借㓂君一年是時恂去郡已乆百姓以其為王朝之卿故謂之借今人作太守在任垂滿者書啓多用借㓂事似不類也夷堅戊志載裴老智數謂紹興十年七月臨安大火延燒城内外室屋數萬區裴方寓居有質庫及金珠肆在通衢皆不顧遽命紀綱僕分徃江下及徐村而身出北關遇竹木塼瓦蘆葦椽桷之屬無論多寡大小盡平價買之明日有㫖竹木材料免征税抽解城中人作屋者皆取之裴獲利數倍過於所焚後閲張芸叟所著浮休閲目集書焦隱事云一日京師火隱晨出之木場凡木皆以姓字題識後至者率詣隱市材始知夷堅指為裴老者誤矣雖曰富家智畧徃徃相似然不應如是之同也娶妻當得隂麗華唐與政仲友謂觀此語知郭后之必廢然予觀劉植傳載劉揚起兵附王郎衆十餘萬光武遣植説揚揚迺降光武因留真定納郭后后即揚之甥也故以此結之則是郭后之納己非光武之情矣何待隂麗華之語而後占其廢乎范煜不以此書之后紀故前輩議論未嘗及之余嘗最城隍爵號後閲國朝會要考西北諸郡東京號靈護廟初封廣祐公後進佑聖王大内别有城隍初封昭貺侯後進爵為公拱州昭靈廟惠烈夫人葢俗傳為宋襄公之媦開德府顯應廟感聖侯解州靈佑廟鎮寶侯濬州黎陽縣顯固廟靈護伯它皆無聞葢東南城隍之盛多起於近世此數者亦徽廟朝錫命耳馬援平交阯賊封新息侯擊牛釃酒勞饗軍士因從容及從弟少㳺之語吏士皆伏稱萬歲又馮魴赦郟賊延褎等亦皆稱萬歲是東都之臣不以稱萬歲為嫌獨竇憲出屯北威與車駕會長安尚書以下欲伏稱萬歲韓稜正色曰禮無人臣稱萬歲之制議者皆慙而止若稜者可謂不為俗所移矣然萬歲之稱三代盛時所無有葢自藺相如奉璧入秦田單為約降燕馮煖焚孟嘗君債劵昉見於簡牘至漢為盛稜之所謂禮豈古之所謂禮邪吳虎臣引虎拜稽首天子萬年謂萬歲發於此然此特詠歌之辭耳非可與後世呼萬歲者同語也世俗笓字當作枇與枇杷之枇字同而音異後漢濟北孝王次喪父至孝梁太后下詔増封有曰頭不枇沐魏志徐季龍取十三種物使管輅占之輅先説雞子後道蠶蛹遂一一名之唯以梳為枇耳陸雲與兄機書案行視曹公器物其中亦有枇字類篇枇凡四音其一毗志切櫛屬集韻同又按説文櫛梳比之緫名也漢文帝遺匈奴單于比疎一或作比余一顔師古注曰辮髮之飾也比音頻寐反則知枇字亦通作比惟笓字無所經據博雅篝筌謂之笓葢捕取魚鰕之具邊迷頻脂二切與此不同雖集韻枇亦作笓類篇笓又毗至切櫛屬然二書晩出當從古詩曰其比如櫛又知三代之前未有枇之名但通謂之櫛而已有相迫比之義矣范煜後漢書楊震傳載安帝時河間男子趙騰上書指陳得失帝怒收考詔獄詰以罔上不道震上疏救之帝不省騰竟伏尸都市張皓傳又載順帝時清河趙騰上言災變譏刺朝政收騰繫考皓上疏諫帝悟減死一等安順兩朝時世相接河間清河二國壤地相鄰不應皆有一趙騰上書皆指言時政皆為人主所怒又皆為大臣救解雖其末一生一死然亦不應如是之同疑只一事而煜誤以為二耳漢武帝徵枚乗乗道死詔問乗子無能為文者後乃得其孽子臯臯字少孺乗在梁時取臯母為小妻又孔光傳淳于長坐大逆誅長小妻迺始等六人佞幸傳張彭祖為小妻所毒薨外戚許后傳后姊孊寡居與淳于長私通因為之小妻後漢趙惠王乾居父喪私聘小妻削中丘縣注云小妻妾也又竇融女弟為大司空王邑小妻陳王鈞取掖庭出女李嬈為小妻樂成靖王黨取故中山簡王傳婢李羽生為小妻梁節王暢上疏辭謝有曰臣暢小妻三十七人其無子者願還本家陳球與劉郃輩謀誅宦者因小妻之父程璜而事泄東觀記又載彭城靖王子男丁前物故恭子酺侮丁小妻見恭傳注周益公行歸正人蕭中一次妻耶律氏制謂次妻二字别無經據乞改稱小妻劄子中注云出漢書指此董卓傳又有少妻之稱疑即小妻也裴松之注三國志孫皓傳引江表傳載張俶事亦曰取小妻三十餘人又駱統傳統母改適為華歆小妻晉宋挺本劉陶門人陶亡後娶陶愛妾為小妻隋王世充祖支頽䅶死其妻少寡儀同王粲納之以為小妻則不獨見於漢史云君子食無求飽居無求安非惡飽而欲飢惡安而欲危也但不可求耳君子之求也惟當求道求在我者而已外此而有所求皆非也所謂求之有道得之有命者亦謂盡其在我而非志於得也他如求為可知夫子之求之也之類皆此意鄉為身死而不受今為宫室之美為之鄉為身死而不受今為妻妾之奉為之此二者固志士之所羞也若為所識窮乏者得我而為之似亦可矣而均之為失其本心何邪此猶易解猶曰孔子罪乞醯之意耳經德不回非以干禄也言語必信非以正行也干禄固非美事若正行則何不可者今為學而不事正行果何所事邪惟能識此意而後可與言學矣康節先生左袵吟云自古禦戎無上䇿唯憑仁義是中原王師問罪固能道天子蒙塵爭忍言二晉亂亡成茂草三君屈辱落陳編公閭延廣何人也始信興邦亦一言蓋豫䜟靖康之禍也篇末雖託二晉以為詞然因王師問罪而致㓂惟燕山之役為然二晉所無也深切著明如此而讀者多不察余聞之友人曾幼輿宏譽而始悟因記康節觀有唐吟有云憑髙始見山河壯入夏方知日月長三百年間能混一事雖成徃道彌光亦寓微意又觀盛化吟有云生來只慣見豐稔老去未嘗經亂離其子謂亂離之語太過康節歎曰吾老且死矣汝輩行且知之唐人稱縣令曰明府而漢人謂之明廷見范曄書張儉傳明府以稱太守山隂老叟稱劉寵劉翊稱种拂髙獲稱鮑昱皆然楊文公談苑謂元稹作春深題二十篇並用家花車斜四字為韻白居易劉禹錫和之亦同此韻次韻起於此髙承著事物紀原取其説余按梁書王規傳普通六年髙祖於文德殿餞廣州刺史元景隆詔羣臣賦詩同用五十韻則唐以前固有之矣余前辨劉信羮頡之封後閲能改齋漫録引王觀國學林新編謂是潁川地名不羮者彼自不羮此自羮頡地名之同一字者多矣豈可比而一之審如王説則頡字何從而來邪俚俗謂娶妻為索妻亦有所本三國志吕布傳云袁術欲結布為援乃為子索布女關羽傳云孫權遣使為子索羽女又隋書太子勇傳載獨孤后曰為伊索得元家女張清源淏雲谷雜紀辨歐陽集古録目為後漢人亦有複名者然僅載蘇不韋孔長彦兄弟劉騊駼丘季智張孝仲范特祖召公子許偉康司馬子威十人而已考之范煜書葢不止此如延岑護軍鄧仲況見蘇竟傳鄭𤣥師事京兆第五元先又從東郡張恭祖𤣥之子名益恩亘榮族人亘元卿陳忠薦士其一曰成翊世翊世字季明見杜根傳後陳敬王曾孫寵傳注引謝承書袁術使將張闓陽殺陳相駱俊梁冀之弟名不疑越嶲太守李文德素善延篤黨錮傳序有渤海公族進階注云公族姓也名進階李膺欲按宛陵大姓羊元羣孔融傳有太傅馬日磾皇甫嵩子名堅夀酷吏李章傳有安丘大姓夏長思宦者曹節弟名破石王逸子名延夀字文考方術傳謝夷吾字堯卿之類清源皆未及也他尚有之猶恨不能盡記李延夀南北史成惟隋書别行餘七史㡬廢大抵紀載無法詳畧失中故冝行而不逺且史傳紀事出於一人之手而自為同異者亦有之矣未有卷帙聯屬首尾衡決而不能自覺者也姚思廉梁書列傳第三十卷江革傳謂何敬容掌選序用多非其人革性彊直常有褒貶而第三十一卷何敬容傳乃謂敬容銓序明審號為稱職夫史者所以傳信萬世今若此其將何所從乎其餘可笑者甚多未暇盡著白樂天長恨歌書太真本末詳矣殊不為魯諱然太真本夀王妃顧云楊家冇女初長成養在深閨人未識何邪葢宴昵之私猶可以書而大惡不容不隱陳鴻傳則畧言之矣唐新書承天皇帝倓傳以興信公主季女張為恭順皇后㝠配焉汪玊山辨證謂㝠配前已有而新書不書嘗考汪外孫鄭子敬寅注引唐會要懿德太子重潤中宗即位追贈國子監丞聘裴粹亡女為㝠婚合葬雖然不始於唐也三國志載邴原女早亡時曹操愛子倉舒亦没操欲求合葬原曰合葬非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉操乃止然竟聘甄氏亡女與合葬又太和六年魏明帝愛女淑薨追封謚淑為平原懿公主為之立廟取文昭甄后亡從孫黄與合葬追封黄列侯以夫人郭氏從弟德為之後承甄氏姓封德為平原侯襲公主爵則漢魏問已行之矣讀諸葛孔明出師表而不墮淚者其人必不忠讀李令伯陳情表而不墮淚者其人必不孝讀韓退之祭十二郎文而不墮淚者其人必不友青城山隱士安子順世通云謂有疾曰不快陳夀作華佗傳已然葛常之韻語陽秋云晉書阮咸傳云咸善琵琶今有圓槽而十三柱者世號阮亦謂阮咸相傳謂阮咸所作故以為名而咸傳乃不及此山谷聽宋宗儒摘阮歌云手揮琵琶送飛鴻促絃聒醉驚客起圓璧庚庚有横理閉門三月傳國工身今親見阮仲容則亦以為仲容所作豈咸用琵琶餘製而作阮邪據此則是常之不知阮咸所出余按國史纂異云元行冲賔客為太常少卿時有人於古墓中得銅物似琵琶而身正圓莫有識者元視之曰此阮咸所造樂具乃令匠人改以木為聲清雅今呼為阮咸者是也盧氏雜説云晉書稱阮咸善彈琵琶後有發咸墓者得琵琶以瓦為之時人不識以為於咸墓中所得因名阮咸陳晉之𤾉樂書云阮咸五絃本秦琵琶而頸長過之列十二柱焉唐武后時蒯明於古冢得銅琵琶晉阮咸所造也元亨中命工以木為之聲甚清徹頗類竹林七賢圖所造舊器因以阮咸名之亦以其善彈故也聖朝太宗於舊制四絃上加一絃三説葢大同而小異今世所行皆四絃十三柱者與旹竊聞今禁中女樂别有所謂阮其制視民間者絶不同且甚大須坐而奏之鄉人郭子雲應龍守南安時大庾令之婦乃出宫人能為此郭葢親見之唐書樂志云五絃如琵琶而小北國所出樂工裴神符初以手彈太宗悦甚後人習為搊琵琶則是唐已有五絃矣不知𤾉因唐之太宗而誤為本朝邪抑别有考按邪夷堅支乙載紫姑詠手詩笑折櫻桃力不禁時攀楊柳弄春隂管絃曲裏傳聲慢星月樓前斂拜深繡幕偷回雙舞袖緑牎閒整小眉心秋來㡬度挑羅襪為憶相思放却針唐韓致光香奩集亦有詠手一詩暖白膚紅玊筍芽調琴抽線露尖斜背人細撚垂臙鬢向鏡輕勻襯眼霞悵望昔逢褰繡幔依稀曾見托金車後園笑向同行道摘得蘼蕪又一杈其體正同葢皆言手之用爾韓詩獨首句不然侯嬴為夷門監者按大梁城十二門東曰夷門則夷門者大梁之一門耳後人遂直指汴京為夷門非也容齋續筆辨臺城少城類此古者道路男子由右婦人由左車從中央今遂寧府譙門之外有橋曰儀橋不知何時所剏上加欄楯道分為三尚彷彿古人之意謂之儀者猶儀門也周文忠序文苑英華首云太宗皇帝丁時太平以文化成天下既得諸國圖籍聚名士於朝詔修三大書曰太平御覽曰册府元龜曰文苑英華洪文敏序夷堅三志癸亦云太平興國中詔侍從館閣集著策府元龜文苑英華御覽廣記等四書予按冊府元龜乃景德二年編類至大中祥符六年書成皆真宗朝二公之言偶失之俗間謂籠燭為照道此二字出儀禮注冬至賀禮古無有也其殆始於漢乎漢雜事曰冬至陽生君道長故賀沈約宋書曰魏晉冬至日受萬國及百寮稱賀因小㑹其儀亞於歲朝北齊書庫狄伏連冬至之日親表稱賀其妻減馬豆設豆餅伏連大怒葢歴代行之至今不廢按月令仲冬之月日短至隂陽爭諸生蕩君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲静以待隂陽之所定易曰先王以至日閉關商旅不行后不省方五經通義云冬至寢兵鼓商旅不行君不聽政事曰冬至陽氣萌隂陽交精始成萬物氣微在下不可動泄王者承天理故率天下静而不擾也白虎通云冬至前後君子安身静體百官絶事不聽政擇吉辰而後省事今僕僕交相賀則所謂安身静體静而不擾以待隂陽之定者果何在哉又按月令仲夏之月日長至仲冬之月日短至今世反稱冬至為長至尤非是曹子建冬至獻襪頌表云伏見舊儀國家冬至獻履貢襪所以迎福踐長崔浩女儀云近古婦人常以冬至上履襪於舅姑踐長至之義也隋杜臺卿玊燭寶典云冬至日極南景極長隂陽日月萬物之始律當黄鍾其管最長故有履長之賀葢周禮冬至日在牽牛景長一丈三尺日短而景長也黄鍾之律九寸於十二律為最長月令所謂短至謂日之短曹崔杜謂踐長履長者景之長琯之長也雖所指不同然當以月令為正諫議大夫稱大諫始於近世然於古有之齊威公使鮑叔牙為大諫見管子第二十篇韓子蒼云韋蘇州少時以三衛郎事𤣥宗豪縱不覊𤣥宗崩始折節務讀書然余觀其人為性髙潔鮮食寡欲所居掃地焚香而坐與豪縱者不類其詩清深妙麗雖唐詩人之盛亦少其比又豈似晩節學為者豈蘇州自序之過歟然天寶間不聞蘇州詩則其詩晩乃工為無足怪葉石林南宫詩話云蘇州詩律深妙白樂天輩固皆尊稱之而行事畧不見唐史為可恨以其詩語觀之其人物亦當髙勝不凡劉禹錫集中有太和六年舉自代一狀然應物温泉行云北風慘慘投温泉忽憶先皇廵幸年身騎厩馬引天仗直至華清列御前則嘗逮事天寶間也不應猶及太和時葢别是一人或集之誤苕溪漁隱云蘇州集有燕李録事詩云與君十五侍皇闈曉拂爐烟上玊墀又温泉行云出身天寶今幾年頑鈍如鎚命如紙余以編年通載考之天寶元年至太和六年計九十一年應物於天寶間已年十五及有出身之語不應能至太和間也蔡寛夫云南宫詩話世誤傳蔡寛夫作漁隱故云劉禹錫所舉别是一人可以無疑矣容齋隨筆云韋蘇州集中有逢楊開府詩云少事武皇帝無賴恃恩私身作里中横家藏亡命兒朝持摴蒱局暮竊東鄰姬司𨽻不敢捕立在白玊墀驪山風雪夜長楊羽獵時一字都不識飲酒肆頑癡武皇升仙去憔悴被人欺讀書事已晩把筆學題詩兩府始收跡南宫謬見推非才果不容出守撫惸嫠忽逢楊開府論舊涕俱垂味此詩葢應物自叙其少年事也其不羈乃如此李肇國史補云應物為性髙潔鮮食寡欲所居焚香掃地而坐其為詩馳驟建安已還各得風韻葢記其折節後來也應物為三衛正天寶間所為如是而吏不敢捕又以見時政矣與峕謂應物行事散軼唐史失不立傳故諸家之説未能㑹于一近世沈明逺作喆始櫽括應物集及它書為傳甚詳然論斷中亦以劉賔客所舉為疑今筆於此韋應物京兆長安縣人也見崔都水及休日還長安胄貴里及歲日寄弟并荅崔甥詩其家世自宇文周時孝寛以功名為將相而其兄夐髙尚不仕號為逍遥公夐之孫待價仕隋為左僕射封扶陽公待價生令儀為唐司門郎中令儀生鑾鑾生應物見林寶姓纂少逰太學見贈舊識詩當開元天寶間宿衛仗内親近帷幄行幸畢從見宴李録事并鄭户曹及逢楊開府温泉行等詩按通典左右宿衛侍從皆以髙䕃子弟年少美風姿者補之為貴胄起家之髙選頗任俠負氣洎漁陽兵亂後流落失職乃更折節讀書屏去武功之上方見逢楊開府及經武功舊隠詩復返灃上園廬蕪没貧無以自業見歸灃上詩客逰江淮間所與交結皆一時名士見會梁川故人及李栖梧㑹大梁亭等詩因從事河陽去為京兆功曹攝髙陵令見寄弟及别子西詩永泰中遷洛陽丞兩軍騎士倚中貴人勢驕横為民害應物疾之痛繩以法被訟弗為屈見示從子班詩棄官養疾同德精舎見同德精舍詩起為鄠令大厯十四年除櫟陽令復以疾謝去歸寓西郊見歸西郊詩擇勝隱於善福祠從諸生學問澹如也見西齋示諸生詩建中二年拜尚書比部外郎明年出為滁州刺史見别善福祠詩滁山川清逺山中多隠君子應物風流豈弟與其人覽觀賦詩郡以無事人安樂之見全椒道士及釋良史等詩四年十月德宗幸奉天應物自郡遣使間道奔問行在所明年興元甲子使還詔嘉其忠見寄弟詩終更貧不能歸留居郡之南嵒見歲日寄端武詩俄擢江州刺史見登郡樓詩居二歲召至京師貞元二年由左司郎中補外得蘇州刺史見荅李士㢲詩在郡延禮其秀民撫其􅑱嫠甚恩見郡齋文士宴集詩乆之白居易自中書舍人出守吳門應物罷郡見劉禹錫集中酬白舍人詩云蘇州刺史例能詩西掖今來替左司寓於郡之永定佛寺見寓永定詩太和以太僕少卿兼御史中丞為諸道鹽鐵轉運江淮留後年九十餘矣不知其所終見劉禹錫太和六年為蘇州刺史舉官自代狀云諸道鹽鐵轉運江淮留後朝議郎太僕少卿兼御史中丞上柱國韋應物歴掌劇務皆有美名執心不回臨事能斷所職雖重本官尚輕内省無能輒敢公舉司𣙜筦之利誠籍時才流豈弟之風實為邦本謹按太和年去應物刺郡時已更六朝四十餘年矣而夢得猶舉之豈其遺愛尚存邪又據應物送鄒少府詩云天寶為侍臣歴觀兩都士宴李録事詩云十五侍皇闈然則天寶中應物在三衛年始十五至太和計年九十餘然自蘇州罷郡寓永定以後集中不復有詩豈四十年間無一篇詩者葢亡之也予嘗歎息於斯焉有子曰慶復為監察御史河東節度掌書記見姓纂應物性髙潔見李肇國史補善為詩氣質閒妙渾然天成初若不用工而近世詩人莫及也白居易嘗語元稹曰韋蘇州歌行才麗之外深得諷諫之意而五言尤為髙逺雅淡自成一家其為時人推重如此浮屠皎然者頗工近詩嘗擬應物體格得數解為贄應物弗善也明日録舊䞇以見始被領畧曰人各有能有不能葢自天分學力有限子而為我且失其故步矣但以所詣自名可也皎然心服焉見因話録長慶集等應物鮮食寡欲所居焚香掃地而坐見李肇國史補為吳門時年已老矣而詩益造㣲世亦莫能知之也亦白詩子沈子曰予讀韋蘇州詩超然簡逺有正始之風所謂朱絲疏絃一唱三歎者應物當開元天寶宿衛仗内為郎刺史於建中以迄貞元而文宗太和中劉禹錫乃以故官舉之計其年九十餘而猶領轉輸劇職應物何夀而康也然自吳郡以後不復有詩文見於録者豈亡之邪使應物而無死其所為當不止此以應物為終於吳郡之後則禹錫之所舉者猶無恙也葢不可得而考也新唐書文藝傳稱應物有文在人間史逸其傳故不録予既愛其詩因考次其平生行義官閥皆有憑藉始終可槩見如此恨史官編摩疎陋耳嗟夫應物﨑嶇身閲盛衰之變晩乃折節學問今其詩徃徃及治道而造理精深士固有悔而能復厄而後竒者如應物有以自表見於後世豈偶然哉漁隱叢話後集又載韓子蒼云韋蘇州少時以三衛郎事𤣥宗豪縱不羈余因記唐宋遺史云韋應物赴杜鴻漸宴醉宿驛亭見二佳人在側驚問之對曰郎中席上與司空詩因令二樂妓侍寢問記得詩否一妓强記乃誦曰髙髻雲鬟宫樣裝春風一曲杜韋娘司空見慣渾閒事斷盡蘇州刺史腸觀此則應物豪縱不羈之性暮年猶在也子蒼又云余觀韋蘇州為性髙潔鮮食寡欲所居掃地焚香而坐此是韋集後王欽臣所作序載國史補之語但恐溢美耳與旹謂盡信書不如無書國史補之説固未可信又安知唐宋遺史為得其實乎此未可以臆斷也賔退録卷九
