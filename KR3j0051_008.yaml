body:
  text: 賔退錄卷八宋趙與峕撰洪文敏著夷堅志積三十二篇凡三十一序各出新意不相複重昔人所無也今撮其意書之觀者當知其不可及甲志序所以為作者之意乙志謂前代志怪之書皆不無寓言獨是書逺不過一甲子為有據依丙志謂始萃此書顓以鳩異崇怪本無意於述人事及稱人之惡然得於容易或急於滿卷帙故頗違初心其究乃至於誣善蓋以告者過或聽焉不審既刪削是正而可為第三書者又已襞積懲前過止不欲為然習氣所溺欲罷不能而好事君子復慫恿之輒私自恕曰但談鬼神之亊足矣毋庸及其他於是取為丙志丁志設或人之辭謂不能玩心聖經勞勤心口從事於神竒荒怪索墨費紙殆半太史公書為可笑從而為之辨戊志謂在閩泮時葉晦叔頗搜索竒聞來助紀錄嘗言近有估客航海不覺入巨魚腹中腹正寛經日未死適木工數輩在取斧斨斫魚脅魚覺痛躍入大洋舉船人及魚皆死予戲難之曰一舟盡沒何人談此事於世乎晦叔大笑不知所答予固懼未能免此也己志謂昔以夷堅志吾書謂與前人諸書不相襲後得唐華原尉張愼素夷堅錄亦取列子之說喜其與己合庚志謂假守當塗地偏少事濟南吕義卿洛陽吳斗南適以舊聞寄似度可半編帙於是輯為庚志初甲志之成歴十八年自乙至巳或七年或五六年今不過數閱月閒之為助如此然平生居閒之日多豈不趣成書亦欠此巨編相傅益耳末又載張徳懋使虜掌訝者問夷堅自丁志後曾更續否而引樂天東坡之事以自况辛志記初著書時欲倣段成式諾臯記名以容齋諾臯後惡其沿襲且不堪讀者輒問乃更今名因載向巨原答問之語壬志全取王景文夷堅别志序表以數語癸志謂九志成年七十有一擬綴輯癸編稚子櫰復云更須從子至亥接續之乃成書予拊之曰天假吾年雖倍此可也人生未可料惡知吾不能及是乎支甲謂或疑所載頗有與昔人傳記相似處殆好事者飾說剽掠借為談助證以蒙莊之語辨其不然又云初欲從稚子請續以十二辰又以段柯古支諾臯支動支植尤崛竒於是名曰支甲支乙則云紹熙庚戌臘從㑹稽西歸至甲寅之夏季夷堅之書緒成辛壬癸三志合六十卷及支甲十卷財八改月又成支乙一編殊自喜也支景則云曾大父諱與甲乙下一字同音而左畔從火故再世以來用唐人所借但稱為景當夷堅第三書出或見警曰禮不諱嫌名乃直名之今是書萌芽稚兒謂稗官說與他所論著及通官文書不侔避之宜矣遂目以支景支丁則自摭此帙中不可信者數事謂茍以其說至斯受之而已矣聱牙畔渙蓋自知之愛竒之過一至於此讀者勿以辭害意可也支戊載吕覽賔卑聚之夢謂夷堅記夢亡慮百餘亊未有若此之可怪者支已謂神竒詭異之事無時不有姑即夷堅諸志考之上焉假諸正夢騰薄穹霄次焉猶陟蓬壺期汗漫不幸而死死矣幸而復生見九地之下溟漲之海以至島鬼淵祗蛇祅牛鬽之類何翅累千萬百所遇非一人所更非一事所歴非一境而莫有同者焉支庚謂四十四日書成自詫其速且叙其所以速之由支辛謂東坡志林李方叔師友談記錢丕行年雜紀之類四五書皆偶附著異事不顓虞初九百之篇士大夫或弗能知故剟剽以為助不幾乎三之一矣支壬則云子弟輩皆言翁既作文不已而掇錄怪竒又未嘗少息殆非老人頥神繕性之福盍己之余受其說未再越日膳飲為之失味步趨為之局束方寸為之不寧精爽如癡向之相勸止者懼不知所出於是逌然而笑豈吾縁法在是如駛馬下臨千丈坡欲駐不可姑從吾志以竟此生異時惛不能進將不攻自縮矣支癸謂劉向父子彚羣書七略班孟堅采以為藝文志小說類定著十五家最後虞初周說九百四十三篇出於禆官街談巷語道聽塗說者之所造今亡矣唐史所摽百餘家六百三十五卷太平廣記率取之不棄也余既畢夷堅十志又支而廣之通三百篇不能滿者才十有一遂半唐志所云三志甲謂櫰子偃孫羅前人所著稗說來示如徐鼎臣稽神錄張文定公洛陽舊聞記錢希白洞微志張君房乘異吕灌園測幽張師正述異志畢仲荀幕府燕閒錄七書多歴年二十而所就卷帙皆不能多三志甲才五十日而成不謂之速不可也三志乙謂兹一編頗得之卜者徐謙謙瞽䨇目而審聽彊記客詣其肆與之言悉追憶不忘倩傍人書以相示昔徐仲車耳聵而四方事無不周知謙豈其苗裔耶賢愚固不可同日語而所以異則同三志景謂郡邑必有圖志鄱陽獨無而夷堅自甲施於三景所粹州里異聞乃至五百有五十他時有好事君子采以為志斯過半矣三志丁則云人年七八十幸身康寧當退藏一室早睡晏起繙貝多旁行書與三生結願否則邀方外雲侣熊經鴟顧斯亦可耳至於著書蓋出下下策而此習膠拲不能釋固嘗悔哂猛藏去弗視乃若禁嬰孺之滑甘未能幾何留意愈甚雖有傾河揺山之辯不復聽矣三志戊謂子不語怪力亂神非置而弗問也聖人設教垂世不肯以神怪之事詒諸話言然書於春秋於易於詩於書皆有之而左氏内外傳尤多遂以為誣誕浮夸則不可三志已謂一話一言入耳當即錄而固有因循而失之者如滕彦智黄雍父所言一二事至今往來於襟抱不釋也三志庚考徐鉉稽神錄辨楊文公談苑所載蒯亮之事非是三志辛云余嘗立說謂古今神竒之事莫不同者今乃悟此語為不廣而證以蜀士孫斯文及幽明錄中賈弼事三志壬引昌黎公明鬼謂夷堅所紀不能出其所證之三非三志癸言太平廣記類聚之誤四志甲辨夷堅為臯陶别名至四志乙則絶筆之書不及序惟支壬三志丁兩序意略同而數序自詫其速者亦不甚相逺云俗謂不冠者曰科頭科頭二字出史記張儀傳注謂不著兠鍪入敵余首卷辨王建宫詞多雜以他人所作今乃知所知不廣蓋建自有宫詞百篇傳其集者但得九十篇蜀本建集序可考後來刻梓者以他人十詩足之故爾混淆余既辨其八矣尚有二首殿前傳㸃各依班召對西來八詔蠻上得青花龍尾道側身偷覷正南山鴛鴦瓦上忽然聲晝寢宫娥夢裏驚元是吾皇金彈子海棠窠下打流鶯者未詳誰作也所逸十篇今見於洪文敏所錄唐人絶句中然不知其所自得其詞云忽地金輿下月陂内人接著便相隨却回龍武軍前過當處教開卧鴨池畫作天河刻作牛玉梭金鑷采橋頭毎年宫女穿針夜敕賜諸親乞巧樓春來睡困不梳頭懶逐君王苑北遊暫向玉花堦上坐簸錢贏得兩三籌紅燈睡裏看春雲雲上三更直宿分金砌雨來行步滑兩人擡起隠金裙蜂鬚蟬翅薄鬆鬆浮動搔頭似有風一度出時抛一遍金條零落滿函中教遍宫娥唱盡詞暗中頭白没人知樓中日日歌聲好不問從初學阿誰彈棊玉指兩參差背局臨虚鬭著危先打角頭紅子落上三金字半邊垂宛轉黄金白柄長青荷葉子畫鴛鴦把來不是呈新様欲進微風到御床供御香方加減頻水沈山麝毎回新内中不許相傳出已被醫家寫與人藥童食後送雲漿髙殿無風扇少涼毎到日中重掠鬢衩衣騎馬繞宫廊唐李昌符婢僕詩二首其一云不論秋菊與春花箇箇能噇空腹茶無事莫教頻入庫一名閒物要些些曲盡婢之情狀乃知古今如此史記秦本紀武公卒塟雍平陽初以人從死從死者六十六人至獻公元年方止從死則知武公而下十有八君之塟必皆有從死者矣不獨繆公也黄鳥之詩特以奄息仲行鍼虎為秦之良臣故國人哀之耳夫一君之塟使六十六人無罪而就死地固已可駭而繆公至用百七十七人習俗之移人雖繆公不能免則獻公亦賢矣哉㒺違道以干百姓之譽罔咈百姓以從已之欲王荆公曰咈百姓以從已之欲則不可咈百姓以從先王之道何為而不可范淳夫云咈百姓則非先王之道也荆公之言主於自文范公則求以矯之其實不然干百姓之譽者有時而違道則道必有時而咈百姓矣祁寒暑雨均曰怨咨小民之情也為政者但當虚心無我據理而行不使纎毫計校毁譽之心亂於胸中足矣王制云古者以周尺八尺為步今以周尺六尺四寸為步管子司馬法皆曰六尺為步秦始皇亦然今以五尺為步步之尺數不同如此周尺之制鄭康成謂未詳聞也近世伊川文集中載作主之制謂當今省尺五寸五分弱潘仲善時舉聞之晦翁謂五寸字誤當作七寸五分弱又謂省尺者三司布帛尺也潘後從㑹稽司馬侍郎家求得温公圖本周尺果當布帛尺七寸五分弱於今浙尺為八寸四分温公圖本必有考按恨不知其源流之詳也歴家以冬至為一歲之首冬至者建子月之中氣故子時初四刻以前繫今日正初刻以後繫明日蓋一理也今太史局歴毎節氣在子初則書其夜子初某刻以别之其來尚矣紹熙二年正月三日壬子其夜子初立春洪文敏以劄子白廟堂云日辰自古以子時為首今既子時立春則當是四日癸丑謂太史之誤其實不然康節冬至吟云何者謂之幾天根理極微今年初盡處明日未來時此際易得意其間難下辭人能知此意何事不能知又云冬至子之半天心無改移一陽初起處萬物未生時𤣥酒味方淡大音聲正希此言如不信更請問庖犧漢髙帝封兄子信為羮頡侯雖以其母轑釡之故然按括地志實有羮頡山在嬀州懷戎縣東南十五里注史記者失不引此顔師古注漢書但云頡音戛言其母戛羮釡也小司馬索隠又直謂爵號耳非縣邑名皆弗深考也古之封侯未有非地名者若武帝封霍去病冠軍侯田千秋富民侯昭帝封霍光博陸侯光武封彭寵奴不義侯以至鐫胡鐫羌向義建䇿之類非制也然冠軍侯國在東郡富民侯國在沛郡蘄縣博陸初食北海河間後益封又食東郡特被以嘉名而已非若光武所封未必有分地也武帝時又有張騫封博望侯趙破奴封從票侯亦未詳其封邑州縣城隍廟莫詳事始前輩謂既有社矣不應復有城隍故唐李陽氷謂城隍神祀典無之惟吳越有爾然成都城隍祠太和中李徳裕所建李白作韋鄂州碑謂大水滅郭抗辭正色言于城隍其應如響杜牧為黄州刺史有祭城隍神祈雨文二首他如韓文公之於潮麴信陵之於舒皆有祭文而許逺亦有眢井鵷翔危堞神護之語則不獨吳越為然蕪湖城隍祠建於吳赤烏二年髙齊慕容儼梁武陵王祀城隍神皆書於史則又不獨唐而已開成中睦州刺史吕述以為合於禮之八蜡祭坊與水庸者今按禮記注水庸溝也正義云坊者所以蓄水亦以鄣水水庸者所以受水亦以泄水則坊蓋今之隄防水庸蓋今之溝澮也方之城隍義殊不類今其祀幾遍天下朝家或賜廟額或頒封爵未命者或襲鄰郡之稱或承流俗所傳郡異而縣不同至於神之姓名則又遷就附㑹各指一人神何言哉負城之邑亦有與郡兩立者獨彭州既有城隍廟又有羅城廟袁州分宜縣既有城隍廟又有縣隍廟尤為創見以今聞見所及攷之廟額封爵具者惟臨安府當後唐清泰元年嘗封順義保寧王與越湖二神並命今號永固廟不知何時所賜紹興三十年封保順通惠侯今封顯正康濟王紹興府梁開平封崇福侯清㤗封興徳保闉王紹興初賜額顯寧今封昭順靈濟孚祐忠應王台州則鎮安廟順利顯應王吉州則靈䕶廟威顯英烈侯筠州則利貺廟靈祐順應顯正王袁州則顯忠廟靈惠侯濠州則孚應廟靈助侯建寧府則顯應廟福應惠寧侯建康之溧水則顯正廟廣惠侯泉州惠安縣則寧濟廟靈安昭祐侯邵武軍則顯祐廟神濟訓順侯泰寧則廣惠廟靖惠孚濟侯韶州則明惠廟善祐侯成州則靈祐廟英祐侯有廟額而未爵命者鎮江忠祐寧國靈䕶隆興顯忠徳安府威澤楚州靈顯和州孚惠襄陽孚濟汀州顯應珍州仁貺靜江嘉佑慶元之昌國邵武之建寧皆曰惠應前代錫爵而本朝未申命者湖州阜俗安城王處州龍泉縣廣順侯鄂州城隍萬勝鎭安王城隍二字亦正元中所封王號越州蕭山縣用郡城隍神初命稱崇福侯昭州立山縣為蒙州時封靈感王台州五縣吳越時皆封以王爵臨海曰興國黄巖曰永寧天台曰始平仙居曰昇平寧海曰安仁其餘相承稱謂如温州富裕侯處州仙都侯臨安府錢塘縣安邑侯臨安縣霸國侯王興國軍髙陵王筠州新昌鹽城王潭州定湘王泉州明烈王潼川興元安平將軍漢州彭州安福將軍卭州大邑縣安靜神廣州羊城使者之類皆莫究其所以也襄陽雖有孚濟額而保漢公之號未知所自寧國雖有靈䕶額而爵稱佑聖不可得而詳隆興雖有顯忠額而南唐嘗封輔徳王故贑州稱輔徳廟南康軍安慶府及潭之益陽太平之蕪湖南安之上猶皆稱輔徳王撫黄復南安臨江諸郡則稱顯忠輔徳王或輔徳顯忠王蓋皆以隆興廟額混南唐爵命以為稱也神之姓名具者鎮江慶元寧國太平襄陽興元復州南安諸郡華亭蕪湖兩邑皆謂紀信隆興贑袁江吉建昌臨江南康皆謂灌嬰福州江隂以為周苛眞州六合以為英布和州為范增襄陽之穀城為蕭何興國軍為姚弋仲紹興府為龎玉實龎堅四世祖事具唐書忠義傳蓋嘗歴越州總管鄂州為焦明南史焦度之父也台州屈坦吴尚書僕射晃之子今州治蓋其故居筠州應智頊唐初州為靖州時刺史南豐游茂洪開元間嘗知縣鎮溧水白季唐縣令也惟筠之新昌祀西晉邑宰盧姓者紹興之嵊祀陳長官慶元昌國祀邑人茹侯三者不得其名耳耳目所不接者尚闕如也承播溱三州及遵義軍未廢時皆嘗錫城隍廟額承曰靜惠播曰昭祐溱曰寧徳遵義曰懷寧承州則又有靜應侯爵今承為綏陽縣遵義為寨皆𨽻珍州溱播之地則折而入於南平之境矣嘉祐雜誌載吳春卿為臨安宰聞故老言錢尚父方睡湯瓶沸一小童以水注之錢曰吾方欲以水注瓶此童先知吾意不可赦遂殺之後見其為厲乃封為霸一作屬國侯使永為臨安土地故塑像為十餘歲小兒今不知塑像何如而土地之稱已轉而為城隍矣太平廣記載宣州司户死而復生云見城隍神自言晉桓彞也與所傳不同然彝今亦别廟食於涇紹興辛未潼川守沈該將新城隍祠夢人齎文書來稱新差土地閱其姓名蓋史堅序事愈涉怪淳熙間李異守龍舒有徳於民去郡而卒邦人遂相傳為城隍神矣尤淺妄不經也唐羊士諤有城隍廟賽雨絶句二首史記齊世家云齊王與舅父駟鈞隂謀發兵索隠云舅父謂舅猶姨稱姨母舅父二字甚新人少用者禮婦人與丈夫為禮則俠拜俠者夾謂男子一拜婦人兩拜夾男子拜今婦人之拜不跪則異於古所謂俠拜江浙衣冠之家尚通行之閭巷則否江鄰㡬嘉祐雜誌載司馬温公之語乃謂陜府村野婦人皆俠拜城郭則不然南北之俗不同如此馮延己謁金門長短句膾炙人口其曰鬬鴨欄干獨倚人多疑鴨不能鬬余按三國志孫權傳注引江表傳曰魏文帝遣使求鬭鴨羣臣奏宜勿與權曰彼在諒闇之中所求若此豈可與言禮哉具以與之陸遜傳建昌侯慮作鬬鴨欄遜曰君侯宜勤覽經典用此何為南史王僧達傳僧達為太子舍人坐屬疾而往楊列橋觀鬬鴨為有司所劾新唐書齊王祐傳祐喜養鬭鴨方未反狸齚鴨四十餘絶其頭去及敗牽連誅死者凡四十餘人則古蓋有之又唐田令孜傳僖宗好鬬鵝數幸六王宅興慶池與諸王鬬鵝一鵝至五十萬錢是鵝亦能鬬也秦捕商君商君亡至闕下欲舍客舍客不知商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為法之弊一至此哉蘇文定謫雷州不許居官舍遂僦民屋章子厚又以為强奪民居下州逮民究治及子厚責雷亦問舍於民民曰前蘇公來章丞相㡬破我家今不可也人以為報古今一轍也西京雜記載武帝欲殺乳母告急於東方朔朔曰帝忍而愎傍人言之益死之速耳汝臨去但屢顧我我當設竒以激之乳母如言朔在帝側曰汝宜速去帝今已大豈念汝乳哺時恩邪帝愴然遂舍之史記滑稽傳禇先生曰武帝時有所幸倡郭舍人者發言陳辭雖不合大道然令人主和說武帝少時東武侯母常養帝帝壯時號之曰大乳母乳母家子孫奴從者横暴長安中有司請徙乳母家室處之於邊奏可乳母當入辭先見郭舍人為下泣舍人曰即入見辭去疾步數還顧乳母如其言郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活邪尚何還顧於是人主憐焉乃下詔止無徙乳母此一事耳一以為殺一以為徙一以為東方朔一以為郭舍人西京雜記顔師古固嘗辨其妄禇所書他事牴牾者亦多皆未可盡信律文罪雖甚重不過絞斬而已凌遲一條五季方有之至今俗稱為法外云姚平仲字希晏世為西陲大將幼孤從父古養為子年十八與夏人戰臧底河斬獲甚衆賊莫能枝梧宣撫使童貫召與語平仲負氣不少屈貫不恱抑其賞然關中豪傑皆推之號小太尉睦州盜起徽宗遣貫討賊貫雖惡平仲心服其沈勇復取以行及賊平平仲功冠軍乃見貫曰平仲不願得賞願一見上耳貫愈忌之他將王淵劉光世皆得召見平仲獨不與欽宗在東宫知其名及即位金人入寇都城受圍平仲適在京師得召對福寧殿厚賜金帛許以殊賞於是平仲請出死士斫營擒虜帥以獻及出連破兩寨而虜已夜徙去平仲功不成遂乘青騾亡命一晝夜馳七百五十里抵鄧州始得食入武關至長安欲隠華山顧以為淺奔蜀至青城山上清宫人莫識也留一日復入大靣山行二百七十餘里度采藥者莫能至乃解縱所乗騾得石穴以居朝廷數下詔物色求之弗得也乾道淳熙之間始出至丈人觀道院自言如此時年八十餘紫髯欝然長數尺靣奕奕有光行不擇崖塹荆棘其速若奔馬亦時為人作草書頗竒偉然秘不言得道之由云此陸放翁所作平仲小傳也放翁亦嘗以詩寄題青城山上清宫壁間云造物困豪傑意將使有為功名未足言或作出世資姚公勇冠軍百戰起西陲天方覆中原殆非一木支脫身五十年世人識公誰但驚山澤間有此熊豹姿我亦志方外白頭未逢師年來幸廢放儻遂與世辭從公遊五嶽稽首餐靈芝金骨換綠髓歘然松杪飛後守新定再作詩託上官道人寄之云太尉關河傑飛騰亦遇時中原方蕩覆大計易差池素壁龍蛇字空山熊豹姿烟雲千萬疊求訪固難知漢張湯韓安國皆以御史大夫行丞相事曹窋以列侯臣賀以太僕行御史大夫事劉歆以太中大夫行太常事樂成以少府行大鴻臚事臣安行以太子少傅行宗正事少府忠行廷尉事王温舒為右輔行中尉事張良以列侯行太子少傅事黄霸以廷尉監行丞相長史事葢寛饒以諫大夫行郎中户將事王尊守京兆都尉行京兆尹事翟義以南陽都尉行太守事蓋漢制官闕則卑者攝為之之謂行亦有以同列通攝者靳石以太常行太僕韓延年以太常行大行令劉徳以宗正行京兆尹之類是也九卿三輔皆同列也今著令以寄祿髙於職事官者為行異於古矣容齋辨陳正敏之妄梁灝非八十二登科是矣與旹因記玉壺清話載仁宗問梁適卿是那箇梁家適對曰先臣祖灝先臣父固上曰怪卿靣貌酷似梁固按國史適乃顥之子固之弟小說家多不考訂率意妄言觀者又不深考往往從而信之如此類甚多殊可笑賔退錄卷八
