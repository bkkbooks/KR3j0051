body:
  text: 賔退録卷七宋趙與峕撰漢文帝用宋昌為衛將軍位亞三司章帝命車騎將軍馬防班同三司延平中拜鄧隲為儀同三司本此後世遂又有開府儀同三司之名三司者三公也唐髙宗武后之時屢興大獄多以尚書刑部御史臺大理寺雜案謂之三司其後有大獄或直命御史中丞刑部侍郎大理卿充三司使次又以刑部員外郎御史大理寺官為之以決疑獄時因有大三司使小三司使之别皆事畢罷鹽鐵度支唐中世已置使亦有判户部者矣然未總命一使亦未謂之三司也後唐同光中勅鹽鐵度支户部三司錢物並委租庸使管轄踵梁之舊制長興元年罷租庸使額分鹽鐵度支户部為三司其年始以前許州節度使張延朗行兵部尚書充三司使三司使自此始國朝因之元豐官制行始罷三司之名三置使者二而各不同讀史未熟者多疑悞故别之北齊源師攝祠部屬孟夏以龍見請雩時髙阿那肱為錄尚書事謂為眞龍出見大驚喜問龍所在云作何顔色師曰此是龍星初見禮當雩祭非謂眞龍肱武人不知書何足責唐杜牧一代文士其賦阿房意逺而辭麗吳武陵至以王佐譽之後世稱誦不絶然有云長橋臥波未雩何龍複道行空不霽何虹既以橋比龍則是以龍見為眞龍矣牧之賦與秦事牴牾者極多如阿房廣袤僅百里牧謂覆壓三百餘里始皇立十七年始滅韓至二十六年盡并六國則是十六年之前未能致侯國子女也牧乃謂王子皇孫輦來於秦為秦宫人有不得見者三十六年阿房終始皇之世未嘗訖役工徒之多至數萬人二世取之以供驪山周章軍至戯又取以充戰士歌臺舞榭元未落成宫人未嘗得居秦本紀所謂殿屋複道周閣相屬所得諸侯美人鐘鼓以充入之者謂渭北宫宇非阿房也牧顧有妝鏡曉鬟脂水之句凡此程㤗之尚書大昌雍錄皆嘗辨之故不詳及獨未雩何龍之語不免與髙阿那肱為類尤可怪也洪駒父詩話載鮑欽止之說謂古本作未雲何龍然未知何所據知欽州林千之坐食人肉削籍𨽻海南天下傳以為異謂載籍以來未之見余記盧氏雜說唐張茂昭為節鎮頻喫人肉及除統軍到京班中有人問曰聞尚書在鎮好人肉虚實笑曰人肉腥而且䏰爭堪喫五代史萇從簡家世屠羊從簡仕至左金吾衛上將軍嘗歴河陽忠武武寧諸鎮好食人肉所至多潛捕民間小兒以食九國志吳將髙灃好使酒嗜殺人而飲其血日暮必於宅前後掠行人而食之又本朝王繼勲孝明皇后母弟太祖時屢以罪貶後以右監門衛率府副率分司西京殘暴愈甚强市民家子女以備給使小不如意即殺而食之以槥櫝貯其骨棄之野外女儈及鬻棺者出入其門不絶太宗即位㑹有訴者斬於洛陽市則知近世亦有之若盜跖及唐之朱粲則在所不足論也呉傅朋說出己意作游絲書世謂前代無有然唐書文藝傳吕向能一筆環寫百字若縈髮然世號連綿書疑即此體也世人瘧疾將作謂可避之他所閭巷不經之說也然自唐已然髙力士流巫州李輔國授謫制時力士方逃瘧功臣閣下杜子美詩三年猶瘧疾一鬼不銷亡隔日搜脂髓增寒抱雪霜徒然潛隙地有靦屢鮮妝則不特避之而復塗抹其靣矣享有體薦宴有折俎體薦謂半解其體而薦之設几而不倚爵盈而不飲肴乾而不食所以訓共儉亦謂之房烝即聘義所謂酒清人渴而不敢飲肉乾人饑而不敢食者也折俎謂體解節折升之於俎物皆可食所以示慈惠亦謂之殽烝若禘祭宗廟郊祭天地全其牲體而升於俎則謂之全烝今人㑹客於殽核之外或别具盛饌或饋以生餼或代以緡錢皆不食之物近於古之體薦者而舉世呼為折俎正與左傳國語本文背馳然今人誤用古語者極多不獨此也沈約宋書禮志云漢建安十年魏武帝以天下彫弊下令不得厚𦵏又禁立碑魏髙貴鄉公甘露二年大將軍參軍太原王倫卒倫兄俊作表徳論以述倫遺美云祗畏王典不得為銘乃撰錄行事就刋於墓之隂此則碑禁尚嚴也此後復弛替非也余按集古金石𨽻釋𨽻續諸書益州太守髙頥碑立於建安十四年綏民校尉熊君碑立於建安二十一年横海將軍吕君碑立於魏文帝黄初二年廬江太守范式碑立於明帝青龍三年皆在魏武下令之後甘露之前惟巴郡太守樊敏碑立於建安十年三月是月或未下令約又謂晉武帝咸寧四年詔石獸碑表既私褒美興長虚偽傷財害人莫大於此一禁斷之其犯者雖㑹赦皆當毁壞至元帝大興元年聽立顧榮碑禁遂漸弛義熙中裴松之復議禁斷亦不然太康四年鄭烈碑距咸寧之詔方五載此後雲南太守碑彭祈碑陳先生碑裴權碑向凱碑成公重墓刻之類續續不絶豈雖有此禁而皆不能盡絶歟歐陽公父子趙徳夫洪文惠諸公議論不到此何邪天下碑錄又有數碑洪文惠謂碑錄不可盡信故不著宋書后妃傳文帝袁后母王夫人當孝武時追贈豫章郡新淦縣平樂鄉君今新淦無此鄉名漫書之或可為他日修方志者之一助不耐煩宋書庾登之弟仲文傳有此語謝景仁居宇淨麗每唾必唾左右人衣殷冲則不然小史非淨浴新衣不得近左右均之好潔相反如此漢建安二十四年呉將吕蒙病孫權命道士於星辰下為請命醮之法當本於此顧况詩飛符超羽翼焚火醮星辰姚鵠詩蘿磴靜攀雲共過雪壇當醮月孤明李商隠詩通靈夜醮達清晨承露盤晞甲帳春趙嘏詩春生藥圃芝猶短夜醮齋壇鶴未迴醮之禮至唐盛矣隋煬帝詩迥步迴三洞清心禮七眞馬戴詩三更禮星斗寸七服丹霜薛能詩符咒風雷惡朝修月露清此言朝修之法也然陳羽步虚詞云漢武清齋讀鼎書内官扶上畫雲車壇上月明宫殿閉仰看星斗禮空虚漢武帝時已如此此髙氏緯略所紀余按周公金縢子路請禱自古有之後世之醮蓋其遺意特古無道士耳黄帝内傳雖有道士行禮之文但謂有道之士非今之道士也太霄經云周穆王因尹軌眞人制樓觀遂召幽逸之人置為道士平王東遷洛邑置道士七人漢明帝永平五年置二十一人魏武帝為九州置壇度三十五人魏文帝幸雍謁陳熾法師置道士五十人晉惠帝度四十九人故用道士請命孫權之前無所見髙所書諸詩亦有非為道士設者神仙修錬之術非親涉其門庭者不能了解近見息庵王思誠序陳泥丸翠虚篇略云採時喚為藥煉時喚為火結時謂之丹養時謂之胎其實一也所産之處曰川源山海所藏之器曰壇爐鼎竈所禀之性有鉛汞水火之名所成之象有丹砂𤣥珠之號惟一物也古人剖析眞元分别氣類所以有採取交㑹煅煉沐浴之說以抽添運用之細微遂有斤兩之論辨析名義比他書粗為明白漫書之牘婦人統兵世但稱唐平陽公主余又記晉王恭討王國寳時王廞聚衆應之以其女為貞烈將軍且盡以女人為官屬顧琛母孔氏為司馬其一也胡幼度紘帥廣傳其答州縣官啟二首其一云蒙恩分閫入境問民皆言法令頓寛遂致傳聞不雅欲銷此謗豈屬他人官廉則蚌蛤自回虎在則藜藿不採其一云兹分帥閫特辱長牋固知能作於文章然亦須閑於法令人言度嶺多酌貪泉乆知此謗之未除願與諸君而一洗紹興間禁中呼秦太師為太平翁翁見陸放翁詩注四朝國史王安石傳史臣曰嗚呼安石託經術立政事以毒天下非神宗之明聖時有以燭其姦則社稷之禍不在後日矣今尚忍言之天變不足畏祖宗不足法人言不足恤此三者雖少正夘言偽而辨王莽誦六藝以文姦言蓋不至是也所立幾何貽害無極悲夫王偁東都事略則曰安石之遇神宗千載一時也而不能引君當道乃以富國强兵為事擯老成任新進黜忠厚崇浮薄惡鯁正樂諛佞是以廉恥汨喪風俗敗壞孟子所謂作於其心害於其事作於其事害於其政者豈不然哉嗚呼安石之學既行則姦宄得志假紹述之說以脅持上下立朋黨之論以禁錮忠良卒之民愁盜起兵連禍結其禍有不可勝言者悲夫與峕舊見象山陸先生所作荆公祠堂記議論尤精確先生嘗與胡季隨大時書云王文公祠記乃是斷百餘年未了底大公案自謂聖人復起不易吾言誠非虚語記曰唐虞三代之盛道行乎天下夏商叔葉去治未逺公卿之間猶有典型伊尹適夏三仁在商此道之所存也周厯之季跡熄澤竭人私其身士私其學横議蜂起老氏以善成其私長雄於百家竊其遺意者猶皆逞於天下至漢而其術益行子房之師實維黄石曹參避堂以舍蓋公髙惠收其成績波及文景者二公之餘也自夫子之皇皇沮溺接輿之徒固己竊議其後孟子言必稱堯舜聽者為之藐然不絶如綫未足以喻斯道之微也陵夷數千百載而卓然復見斯義顧不偉哉裕陵之得公問唐太宗何如主公對曰陛下每事當以堯舜為法太宗所知不逺所為未盡合法度裕陵曰卿可謂責難於君然朕自視眇然恐無以副此意卿宜悉意輔朕庶同濟此道自是君臣議論未嘗不以堯舜相期及委之以政則曰有以助朕勿惜盡言又曰須督責朕使大有為又曰天生畯明之才可以覆庇生民義當與之戮力若虚捐歲月是自棄也秦漢而下南靣之君亦嘗有知斯義者乎後之好議論者之聞斯言也亦嘗隠之於心以揆斯志乎曾魯公曰聖知如此安石殺身以報亦其宜也公曰君臣相與各欲致其義耳為君則自欲盡君道為臣則自欲盡臣道非相為賜也秦漢而下當塗之士亦嘗有知斯義者乎後之好議論者之聞斯言也亦嘗隠之於心以揆斯志乎惜哉公之學不足以遂斯志而卒以負斯志不足以究斯義而卒以蔽斯義也昭陵之日使還獻書指陳時事剖析弊端枝葉扶疎往往切當然覈其綱領則曰當今之法度不合乎先王之法度公之不能究斯義而卒以自蔽者固見於此矣其告裕陵蓋無異㫖勉其君以法堯舜是也而謂毎事當以為法此豈足以法堯舜者乎謂太宗不足法可也而謂其所為未盡合法度此豈足以度越太宗者乎不知言無以知人也公疇昔之學問熙寧之事業舉不遁乎使還之書而排公者或謂容悅或謂迎合或謂變其所守或謂乖其所學是尚得為知公者乎氣之相迕而不相悅則必有相訾之言此人之私也公之未用固有素訾公如張公安道吕公獻可蘇公明允者夫三公者之不悅於公蓋生於其氣之所迕公之所蔽則有之矣何至如三公之言哉英特邁往不屑於流俗聲色利達之習介然無毫毛得以入於其心潔白之操寒於氷霜公之質也掃俗學之凡陋振弊法之因循道術必為孔孟勲績必為伊周公之志也不蘄人之知而聲光赫奕一時鉅公名賢為之左次公之得此豈偶然哉用逢其時君不世出學焉而後臣之無愧成湯髙宗君或致疑謝病求去君為責躬始復視事公之得君可謂專矣新法之議舉朝讙譁行之未幾天下恟恟公方秉執周禮精白言之自信所學確乎不疑君子力爭繼之以去小人投機密贊其決忠樸屏伏憸狡得志曾不為悟公之蔽也典禮爵刑莫非天理洪範九疇帝實錫之古所謂憲章法度典則者皆此理也公之所謂法度者豈其然乎獻納未幾裕陵出諫院疏與公評之至簡易之說曰今未可為簡易修立法度乃所以為簡易也熙寧之政粹於是矣釋此弗論尚何以費辭於其建置之末哉為政在人取人以身修身以道修道以仁仁人心也人者政之本也身者人之本也心者身之本也不造其本而從事其末末不可得而治矣大學不傳古道榛塞其來已乆隨世而就功名者淵源又類出於老氏世之君子天常之厚師尊載籍以輔其質者行於天下隨其分量有所補益然而不究其義不能大有所為其於當世之弊有不能正則依違其間稍加潤飾以幸無禍公方耻斯世不為唐虞其肯安於是乎蔽於其末而不究其義世之君子未始不與公同而犯害則異者彼依違其間而公取必焉故也熙寧排公者大抵極詆訾之言而不折之以至理平者未一二而激者居八九上不足以取信於裕陵下不足以解公之蔽反以固其意成其事新法之罪諸君子固分之矣元祐大臣一切更張豈所謂無偏無黨者哉所貴乎玉者瑕瑜不相掩也古之信史直書其事是非善惡靡不畢見勸懲鑑戒後世所賴抑揚損益以附己好惡用失情實小人得以藉口而激怒豈所望於君子哉紹聖之變寧得而獨委罪於公乎熙寧之初公固逆知己說之行人所不樂既指為流俗又斥以小人及諸賢排公己甚之辭亦復稱是兩下相激事愈戾而理益不明元祐諸公可易轍矣又益甚之六藝之正可文姦言小人附託何所不至紹聖用事之人如彼其桀新法不作豈將遂無所竄其巧以逞其志乎反覆其手以導崇寧之姦者實元祐三舘之儲元豐之末附麗匪人自謂定䇿至造詐以誣首相則疇昔從容問學慷慨陳義而諸君子之所深與者也格君之學克知灼見之道不知自勉而戛戛於事為之末以分異人為快使小人得問順投逆逞其致一也近世學者雷同一律發言盈庭豈善學前輩者哉公世居臨川罷政徙於金陵宣和間故廬丘墟鄉貴人屬縣立祠其上紹興初嘗加葺焉逮今餘四十年隳圯已甚過者咨歎今怪力之祠綿綿不絶而公以蓋世之英絶俗之操殆不世有而廟貌弗嚴邦人無所致敬無乃議論之不公人心之疑畏使至是耶郡侯錢公期月政成人用輯和繕學之既慨然撤而新之視舊加壯為之管鑰掌於學官以時祠焉余初聞之竊所敬歎既又屬記於余余固悼此學之不講士心不明是非無所折衷公為使時舍人曾公復書切磋有曰足下於今最能取於人以為善而比聞有相曉者足下皆不受之必其理未有以奪足下之見也竊不自揆得從郡侯敬以所聞薦於祠下必公之所樂聞也陸放翁感事詩云陋巷何須嘆一瓢朱門能守亦寥寥衲衣先世曾調鼎野褐家聲本珥貂若悟死生均露電未應富貴勝漁樵千年迴首俱陳迹不向杯中何處消自注云沈義倫丞相裔孫為僧劉仁贍侍中裔孫為道人皆孤身死紹興中二公之後遂絶殊不知沈公之後有一泒靖康末自京師流落新淦者居於村疃耕人之田矣又不止於為僧也然其先世告身及相君神道碑摹本故在周文忠序槐庭濟美總集有云粤自周哀賢者之類棄功臣之世絶故孟子告齊宣王以故國非喬木王無親臣矣蓋諷其上也雖然有位於朝不守其業而忘其所甚至公侯之家降在皂𨽻則蓽門圭竇得以陵之此豈獨上之人之罪也哉最為確論古人之坐者兩膝著地因反其蹠而坐於其上正如今之朝跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓於手上也其為稽首則又却其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之類凡言坐者皆謂跪也若漢文帝與賈生語不覺膝之前於席管寧坐不箕股榻當膝處皆穿皆其明驗老子曰雖有拱璧以先駟馬不如坐進此道蓋坐即跪也進猶獻也言以重寶厚禮與人不如跪而告之以此道也今說者乃以為坐禪之意誤也然記又云授立不跪授坐不立莊子又云跪坐而進之則跪與坐又似有小異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以凥著蹠而稍安者為坐也又詩云不遑啟居而傳以啟為跪爾雅以妥為安而疏以為安定之坐夫以啟對居而訓啟為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知蓋兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春說太祝九拜處解竒拜云拜時先屈一膝今之雅拜也夫特以先屈一膝為雅拜則他拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲㨿開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問予既略為考禮如前之云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得已而為塑像則當放此以免於蘇子俯伏匍匐之譏子言又不謂然㑹予亦辭浙東之節遂不能强然至今以為恨也東坡文集私試䇿問云古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就也其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時琢石所為尤足據信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且為寫放文翁石像為土偶以來而塑手不精或者猶意其或為加趺也去年又屬蜀漕楊王休子美今乃併得先聖先師三像木刻精巧視其坐後兩蹠隠然見於帷裳之下然後審其所以坐者果為跪而無疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之謬為之喟然太息姑記本末寫寄同學諸生使書而掲之廟門之左以俟來者考焉此朱文公白鹿禮殿塑像說後其季子在守南康因更新禮殿聞之於朝迄成先志然逺方學者未盡見此說故識之史記黄帝紀神農氏世衰諸侯相侵伐暴虐百姓而神農氏弗能征於是軒轅乃習用干戈以征不享諸侯咸來賔從而蚩尤最為暴莫能伐炎帝欲侵陵諸侯諸侯咸歸軒轅既云諸侯相侵伐而神農氏弗能征矣又云炎帝欲侵陵諸侯何邪尚當訪精於史學者而問之今道家設醮率用米糈世傳始於張陵而實不然陵使百姓從受道者出五斗米非以祠神也按山海經載諸山之神各舉其形狀及祠之之物有糈者居多如鵲山之首自招揺之山以至箕尾之山凡十山糈用稌米自拒山至於漆吳之山凡十七山糈用稌自天虞之山至南禺之山凡一十四山糈用稌崇吾之山至於翼望之山凡二十三山糈用稷米隂山以下至於崦嵫之山凡十九山糈以稻米自太行之山以至於無逄之山凡四十六山皆用稌糈米祠之自敖岸之山至於和山凡五山糈用稌自景山至琴鼓之山凡二十三山糈用稌自女几山至於賈超之山凡十六山糈用稌自首山至於丙山凡九山糈用五種之糈自翼望之山至於几山凡四十八山糈用五種之精禾自篇遇之山至於榮余之山凡十五山糈用稌郭注云糈祀神之米名先吕反今江東音所惟自尸胡之山至於無睪之山凡十九山米用黍自茍林之山至於陽虚之山凡十六山其祠用稌二者無糈字或傳寫脫誤單􅈢之山至於隄山凡二十五山甘棗之山至於鼓鐙之山凡十五山皆曰瘞而不糈管涔之山至於敦題之山凡十七山輝諸之山至於蔓渠之山凡九山皆曰投而不糈自鈐山至於萊山凡十七山則曰鈐而不糈自鹿蹄之山至於𤣥扈之山凡九山則曰祈而不糈郭注直云祭不用米也著明如此山海經雖不敢信為禹益所著然屈原離騷吕氏春秋皆摘取其亊而漢人引用者尤多其書決不出於張陵之後則糈之用也尚矣離騷云巫咸將夕降兮懷椒糈而要之王逸注云糈精米所以享神也淮南子云病者寢席醫之用針石巫之用糈藉所救鈞也許叔重注云糈米所以享神見於載籍者不一第不若山海經之著明耳賔退錄卷七
