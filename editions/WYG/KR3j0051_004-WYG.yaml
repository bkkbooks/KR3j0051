body:
  text: 賔退録卷四宋趙與旹撰班孟堅作楊雄傳獨載所為文歴官行事顧列於贊中它傳皆不然韓退之作劉統軍碑惟書門人故吏之言而世系事實悉具於銘詞正用此體近世惟胡忠簡作趙龍學子潚墓銘亦然誌特書世系𦵏日而已龔遂自渤海徵至京師議曹王生從遂將入宫王生從後呼止遂曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之徳非小臣之力也遂至前上果問以治狀遂對如王生言天子說其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也王生必素知遂不能為此言然後教之宣帝必素知遂非長者然後疑之然遂始能受王生之言而又終以實對是亦長者也已西漢兩萬石君石奮及四子俱二千石景帝號奮曰萬石君馮揚宣帝時為𢎞農太守有八子皆二千石趙魏間榮之亦號曰萬石君又嚴延年兄弟五人俱二千石東海號其母曰萬石嚴嫗東漢有萬石秦氏唐有萬石張家慶厯間廣西戮歐希範及其黨凡二日剖五十有六腹宜州推官呉簡皆詳視之為圖以傳于世王莾誅翟義之黨使太醫尚方與巧屠共刳剥之量度五藏以竹筳導其脈知所終始云可以治病然其説今不傳廣陵所刻夢溪筆談第十八卷積甖之術注中又倍下長得十六當作二十四併入上長得四十六當作二十六士夫知筭術者少故莫辨其誤漫記之宋明帝名彧而其子後廢帝名昱元魏獻文名𢎞而其子孝文名宏皆聲絶相近似當避也周厲王名胡其七世孫僖王名胡齊尤可怪周人以諱事神而猶有此何歟容齋續筆云白樂天詩鞍馬呼教住骰盤喝遣輸長驅波卷白連擲采成盧注云骰盤卷白波莫走鞍馬皆當時酒令予按皇甫松所著醉鄉日月三卷載骰子令云聚十隻骰子齊擲自出手六人依采飲焉堂印本采人勸合席碧油勸擲外三人骰子聚於一處謂之酒星依采聚散骰子令中改易不過三章次改鞍馬令不過一章又有旗旛令閃擪令抛打令今人不復曉其法矣唯優伶家猶用手打令以為戲云以上皆洪説余謂酒令蓋始於投壺之禮雖其制皆不同而勝飲不勝者則一後漢賈逵亦嘗作酒令唐世最勝樂天詩如籌揷紅螺椀觥飛白玉巵打嫌調笑易飲訝卷波遲碧籌攢米椀紅袖拂骰盤之句不一不特如洪所云也本朝歐陽文忠公作九射格獨不别勝負飲酒者皆出於適然其説云九射之格其物九為一大侯而寓以八侯熊當中虎居上鹿居下雕雉猿居右雁兔魚居左而物各有籌射中其物則視籌所在而飲之射者所以為羣居之樂也而古之君子以爭九射之格以為酒禍起為爭爭而為歡不若不爭而樂也故無勝負無賞罰中者不為功則無好勝之矜不中者無所罰則無不能之誚探籌而飲飲非觥也無所恥故射而自中者有不得免飲而屢及者亦不得辭所以息爭也終日為樂而不恥不爭君子之樂也探籌之法一物必為三籌蓋射賓之數多少不常故多為之籌以備也凡今賔主之數九人則人探其一如八人則置其熊籌不及八人而又少則人探其一而置其餘籌可也益之以籌而人探其一或二皆可也進主人臨時之約然皆置其熊籌中則在席皆飲若一物而再中則視執籌者飲量之多少而飲器之大小亦惟主人之命若兩籌而一物者亦然凡射者一周既飲釂則飲籌而復探之籌新而屢變矢中而無情或適當之幸而免此所以歡然為樂而不厭也周文忠謂醉翁亭記云射者中弈者勝觥籌交錯恐或謂此古靈陳述古亦嘗作酒令每用紙帖子其一書司舉其二書祕閣其三書隱君子其餘書士令在座黙探之得司舉則司貢舉得祕閣則助司舉搜尋隱君子進於朝搜不得則司舉并祕閣自受罰酒後復增置新格聘使館主各一員若搜出隠君子則此二人伴飲二人直候隠君子出即時自陳不待尋問隱君子未出之前即不得先言違此二條各倍罰酒注云聘使蓋賞其能聘賢之義館主兼取其館伴之義唐有昭文館學士時人號為館主又云祕閣雖同搜訪隱君子或司舉不用其言亦不得爭權或偶失之即不得以司舉不用己言而辭同罰也然則倍罰司舉祕閣既探得即各明言之不待人發問如違先罰一觴司舉祕閣止得三搜客滿二十人則五搜餘人探得帖子並黙然若妄宣傳罰巨觴别行令古靈集載潘家山同章衡飲次行令探得隠君子為章衡搜出賦詩云吾聞隱君子大隱廛市間道義充諸中測度非在顔堯帝神且智知人亦孔艱勉哉二祕閣賢行如髙山近歲廬陵李寳之如圭作漢法酒云漢法酒立官十曰丞相曰御史大夫曰列卿曰京兆尹曰丞相司直曰司𨽻校尉曰侍中曰中書令曰酒泉太守曰協律都尉拜司𨽻校尉者持節職舉劾劾及中書令酒泉太守者令太守以佞幸湎淫即得罪劾及侍中則司𨽻去節劾及京兆尹則上愛其才事留中不下皆别舉劾劾丞相司直則司直亦劾之劾列卿則列卿自訟廷辯之罪其不直者其劾丞相御史大夫者亦聴須先謁而後劾丞相御史亦得罪丞相得罪則中書令酒泉太守皆望風自劾御史得罪則惟酒泉太守自劾司𨽻以不畏彊禦後若有罪以贖論若泛劾而及丞相御史者罪司𨽻劾及京兆尹者事雖留中酒泉太守亦自劾劾及中書令者侍中自劾諸劾自劾得罪者皆降平原督郵協律都尉歌以餞之劾及協律者下之蠶室弦歌詩為新聲而求幸又書其後云右酒令也戲用漢制為之集者止九人則缺京兆尹八人則缺侍中七人則御史大夫行丞相事六人則缺司直當飲者皆即飲之或未舉飲者亦可計集者之數以為除官之數每當飲者予一筭除官既周視其筭以為飲齊三筭者即飲之二筭者與其筭等者決之一筭則留以須後律令載所不及者比附從事云今館閣有小酒令一卷慶厯中錦江趙景撰飲戲助歡三卷元豐中安陽竇譝撰酒令在焉玉籖詩一卷皇朝知黔南縣黄鑄撰以詩百首為籖使探得者隨文勸酒鑄字徳器栁州人釣鼇圖一卷不知作者刻木為鼇魚之屬沈水中釣之以行勸罰凡四十類各有一詩又有採珠局亦此類序稱撰人為王公不知其名凡三十餘類亦各有一詩又有捉卧甕人格皇朝李庭中撰以畢卓嵇康劉伶阮孚山簡阮籍儀狄顔囘屈原陶潛孔融陶侃張翰李白白樂天為目蓋與陳李之格大同小異特各更其名耳投壺經唐上官儀嘗奉敇刪定史𤣥道續注蓋采周顒郝同梁簡文數家之書為之司馬文正公更以新格舊書為之盡廢晁子止侍郎公武郡齋讀書志又有木射圗一卷云唐陸秉撰為十五筍以代侯擊地毬以觸之筍飾以朱墨字以貴賤之朱者仁義禮智信温良恭儉讓墨者慢傲佞貪濫仁者勝濫者負而行賞罰焉疑亦此具也梁王魏帝金谷蘭亭又皆於遊燕之際以賦詩作賦不成者罰酒高續古似孫緯略已詳此不重出秦會之當國決意講和金俄背盟秦不知所措張巨山嵲為司勲郎為代作自解之奏略曰伊尹告成湯徳無常師主善為師臣前贊議和今請伐金是皆主善為師如其不濟則陳力就列不能者止當遵孔聖之訓秦大喜擢巨山為右史而不知所引皆誤也時祕書省寓法慧寺或大書于門云周任為孔聖太甲作成湯秦大怒疑出於館職相繼斥去然史記殷本紀載伊尹作咸有一徳於成湯之時則司馬子長已誤矣蔡邕引致逺恐泥新唐書傳引以能問於不能皆以為孔子之言亦非漢杜延年為御史大夫居父官府不敢當舊位坐卧皆易其處元魏任城王澄之子順除吏部尚書兼右僕射上省登階向榻見榻甚故問都令史荅曰此榻曽經先王坐順即哽塞涕泗交流乆而不能言遂令換之唐薛元超為中書舎人省中有盤石其祖道衡為隋内史侍郎時嘗據以草制元超每見輒泫然流涕裴諝五世為河南諝視事未嘗敢當正處居世官者當如此矣晉琅邪王澄有髙名少所推服每聞衛玠言輒歎息絶倒時人語曰衛玠談道平子絶倒今流俗謂大笑為絶倒非也先鑑堂朝野遺事云王文正公曽相真宗吕許公夷簡為參知政事仁宗朝吕為首相王再入議論多不合王求去甚力一日上留許公問所以處王公者吕皇恐不敢當上再三問之曰王某先朝舊臣當得使相或洛或許惟聖裁再問其次曰無已則大資政或青或鄆上首肯吕甚喜出省與宋宣獻綬分路忘相揖晩報鎖學士院諸子問皆不荅夜深獨語晦叔曰次輔均勞矣明日盛服入朝則兩麻也吕判許州王知鄆州仁宗聖斷如此又孔毅父平仲談􅁐云張鄧公吕許公同作宰相一日朝退仁宗獨留吕公問曰張士遜乆在政府欲與一差遣出去吕公曰士遜出入兩朝亦頗宣力仁宗曰恩命如何吕公曰與除靜江軍節度使檢校太傅知許州仁宗曰不虧他否吕公曰聖恩優厚吕公既退張吕親姻也私焉曰主上獨留公必是士遜别有差遣因祈以恩命吕沈吟乆之曰使弼使弼張亦欣然慰望是日張公打屏閤子内物色過半矣既夕鎖院明日早張公令院子盡般閤子内物色歸家更不趨待漏院只就審官東院待漏既入朝張公唯祇候宣麻吕公唯準擬押麻耳忽有堂吏報吕公云相公知許州吕公大驚於是張公押麻乃吕公除靜江軍節度使檢校太傅知許州也與旹按吕夷簡張士遜同相在天聖明道間章獻后上僊仁宗始親政與夷簡謀以樞密使張耆副史夏竦范雍趙稹參知政事陳堯佐晏殊皆章獻所任用悉罷之退告郭皇后后曰夷簡獨不附太后耶但多機巧善應變耳由是并罷夷簡為武勝軍節度使同平章事判陳州及宣制夷簡大駭不知其故素厚内侍閻文應使為中詗乆之乃知事由皇后其後再相贊成廢后之議實原於此談苑所載皆不合且節度使檢校太傅而不加辨章亦非使弼文徳殿宣布惟參政一員押麻餘宰執皆不往宰相亦不當押麻其書疑近世不知典故者所為必非孔氏本真至景祐四年四月夷簡自昭文相罷為檢校太師同平章事鎮安軍節度使判許州王曽自集賢相罷為尚書左僕射資政殿大學士判鄆州當以遺事為正初命曽知青州既入謝求改鄆州又僕射典州不當云知遂貼麻改命綬時參知政事亦同罷云苐曾初拜相夷簡執政皆在乾興元年七月時仁宗已踐阼真宗末年曽參知政事夷簡知開封府而已遺事謂曽相真宗夷簡參知政事亦誤也沈存中筆談云穎昌陽翟縣有一杜生者不知其名邑人但謂之杜五郎所居去縣三十餘里唯有屋兩間其一間自居一間其子居之室之前有空地丈餘即是籬門杜生不出籬門凡三十年矣黎陽尉孫軫曽往訪之見其人頗瀟灑自言村民無所能何為見訪孫問其不出門之因笑曰以告者過也指門外一桑曰十五年前亦曽到此桑下納涼何謂不出門也但無用於時無求於人偶自不出耳何足尚哉問其所以為生曰昔時居邑之南有田五十畝與兄同耕後兄之子娶婦度所耕不足以贍乃以田與兄攜妻子至此偶有鄉人借此屋遂居之唯與人擇日又賣一藥以具饘粥亦有時不繼後子能耕鄉人見憐與田三十畝令子耕之尚有餘力又為人傭耕自此食足鄉人貧以醫自給者甚多不當更兼其利自爾擇日賣藥一切不為又問常日何所為曰端坐耳無可為也問頗觀書否曰二十年前亦曽觀書問觀何書曰曽有人惠一書册無題號其間多説淨名經亦不知淨名經何書也當時極愛其議論今亦忘之并書亦不知所在乆矣氣韻閑曠言詞精簡有道之士也盛寒但布袍草履室中枵然一榻而已問其子何如曰村童也然質性甚淳厚未嘗妄言未嘗嬉遊唯買鹽酪則一至邑中可數其行跡以待其歸徑往徑還未嘗傍遊一步也蔡絛鐵圍山叢談云靖康末有避亂於順昌山中者深入得茅屋主人風裁甚整即之語士君子也怪而問曰諸君何事挈孥能至是邪因語之故主人曰亂何自而起乎衆爭為言主人嗟惻乆之曰我父迺仁廟朝人也自嘉祐末卜居於此因不復出以我所聞但知有熙寧紀年亦不知于今幾何年矣洪文敏夷堅已志云陳元忠少魏漳州龍溪人客居南海嘗赴省試過南安㑹日暮趨城尚逺投宿野人家茅茨數椽竹樹茂密可愛主翁雖麻衫草屨而舉止談對宛若士人几案間有文籍散亂視之皆經子也陳叩之曰翁訓子讀書乎曰種園為生耳亦入城市乎曰十五年不出矣問藏書何用曰偶有之因雜以它語少焉暴風雨作其二子荷蓑負鋤歸大兒可十八九小兒十四五倚鋤前揖人物可觀絶不類農家子翁進豆羮享客不復共談遲明陳别去至城以事留一日偶適市見翁倉皇而行陳追詰之曰翁云十五年不入城何為到此曰吾以急事不容不出問其故不肯言固問之乃大兒於闗外粥果失税為關吏所拘陳為謁監征至則已捕送郡翁與小兒偕詣庭下長子當杖翁懇白郡守曰某老鈍無能全藉其子贍給若渠不勝杖則翼日乏食矣願以身代之小兒曰大人豈可受杖某願代兄兄又以罪在己甘心焉三人爭不決小兒來父耳旁語若將有所請翁叱之兒必欲前郡守頗疑之呼問所以對曰大人元係帶職正郎宣和間累典州郡翁急拽其衣使退曰兒狂妄言守詢誥敇在否兒曰見作一束置甕中埋於山下守立遣吏隨兒發取果得之即延翁上坐謝而釋其子次日枉駕訪之室已虚矣三事略相似世之慕紛華汩利禄事表襮者聞其風泚其顙矣杜生真有道之士南安翁棄官而晦其迹亦人所難能順昌山中主人避世者耳南安翁大兒不能保身幾禍其父其亦有愧于杜生之子矣顏之推家訓云昔侯霸之子孫稱其祖父曰家公陳思王稱其父曰家父母為家母潘尼稱其祖曰家祖古人之所行今人之所笑也今南北風俗言其祖及二親無云家者田里猥人方有此言之推北齊人逮今幾七百年稱家祖者復紛紛皆是名家望族亦所不免家父之稱俗輩亦多有之但家公家母之名少耳山簡謂年幾三十不為家公所知蓋指其父非祖也呉曽能改齋漫録云仁宗嘗御便殿有二近侍爭辯聲聞御前仁宗召問之曰甲言貴賤在命乙言貴賤由至尊帝黙然即以二小金合各書數字藏於中曰先到者保奏給事有勞推恩封祕甚嚴先命乙攜一往内東門司約及半道命甲攜一繼往無何内東門司保奏甲推恩仁宗恠問之乃是乙至半道足跌傷甚莫能行甲遂先到與旹按唐張鷟朝野僉載魏徵為僕射有二典事之長參時徵方寢二人牎下平章一人曰我等官職總由此老翁一人曰總由天上徵聞之遂作一書遺由此老翁者送至侍郎處云與此人一員好官其人不知出門心痛憑由天者送書明日引注由老翁者被放由天上者得留徵怪而問焉具以實對乃歎曰官職禄料由天者蓋不虚也二事蓋只一事曽傳聞之誤耳聖君賢相一嚬一笑猶當愛之豈肯激於一夫之言而輕用慶賞鄭公之事已不足信而我仁宗皇帝豈為是哉開禧丙寅眉州重修圖經號江鄉志末卷雜記門云佛日大師宗杲每住名山七月遇蘇文忠忌日必集其徒修供以薦嘗謂張子韶侍郎曰老僧東坡後身張曰師筆端有大辨才非老先生而何鄉僧可昇在徑山為侍者親聞此語今按杲年譜蓋生於元祐四年己巳而東坡卒於建中靖國元年辛巳此時杲已十三歲矣杲平生尊敬東坡忌日修供或有之必無後身之説可昇之妄也封國公者先小國次次國後大國已至大國者許於本等内改封國朝之制也洪忠宣以子貴追封鄒徙封衛乾道三年十二月改封魏矣至七年四月又再封魏其誥前銜稱贈太師追封魏國公後又云可特追封魏國公餘如故范文穆行詞略云魏大名也其命維新或謂既不改封他國何必命詞給告他人未見有重複如此者然余讀許崧老翰外制有大禮封贈曽祖追封楊楚國公贈太師者逸其姓名注云元贈太師追封楊楚今再封制略曰封兼楊楚位極公師雖寵數不可以復加而申命用昭其無斁則知已有前比矣後漢陳寵傳云十三月陽氣已至天地已交萬物皆出蟄虫始振人以為正夏以為春又隋書牛𢎞傳云今十一月不以黄鍾為宫十三月不以太簇為宫便是春木不王夏土不相則知正月亦可稱十三月魯氏自備但記陳寵一事云今世男子初入學多用五嵗或七嵗蓋俗有男忌雙女忌隻之説以至笄冠亦然按北齊書李渾弟繪傳繪年六嵗便自願入學家人以偶年俗忌約而弗許伺其伯姊筆牘之閒而輒竊用未幾遂通急就章内外異之則其來乆矣陶穀五代亂紀載黄巢遁免後祝髮為浮屠有詩云三十年前草上飛鐵衣著盡著僧衣天津橋上無人問獨倚危欄看落暉近世王仲言亦信之筆於揮麈録殊不知此乃以元微之智度師詩竄易磔裂合二為一元集可考也其一云四十年前馬上飛功名藏盡擁禪衣石榴園下擒生處獨自閑行獨自歸其二云三陷思明三突圍鐵衣抛盡納禪衣天津橋上無人識閑凭欄干望落暉齊已折楊栁詞穠低似中陶潛酒軟極如傷宋玉風以中酒之中為去聲於義為長徐邈中聖人三國志既無音未可懸㫁為平聲也毋持布皷過雷門漢王尊語師古注謂雷門㑹稽城門也有大鼓越擊此鼓聲聞洛陽故尊引之也布鼓謂以布為鼓故無聲曽文清詩敗鼓無聲强自撾不堪持過阿香家似用王語㸃化而誤以雷門為雷霆之雷洪文敏續筆謂城門名用一字者為雅馴歴舉左氏公羊諸書所載亦獨遺此鮑明逺行路難首云奉君金巵之美酒瑇瑁玉匣之瑤琴七綵芙蓉之羽帳九華蒲萄之錦衾黄魯直送王郎酌君以蒲城桑落之酒泛君以湘纍秋菊之英贈君以黟川㸃漆之墨送君以陽關墮淚之聲正用其體漢儋耳郡本朱崖之地唐為儋州本朝為昌化軍中國極南之地也山海經儋耳之國在大荒北任姓禺號子食穀北海之渚中郭景純注云其人耳大下儋垂在肩上朱崖儋耳鏤畫其耳亦以放之也吕氏春秋審分覽任數篇亦曰東至開梧南撫多􅱋西服夀靡北懷儋耳高誘注云北極之國又恃君覽云雁門之北鷹隼所鷙須窺之國饕餮窮竒之地叔逆之所儋耳之居多無君注云北方無君之國也則是極北别有一儋耳朱崖之名蓋晚出云古今論天體者言人人殊然天主乎動地主乎靜未有謂地動者也惟考靈耀曰地有四遊冬至地上北而西三萬里夏至地下南而東三萬里春秋二分其中矣地恒動不止譬如人在舟而坐舟行而人不覺其説獨異陸放翁入蜀記載其入沌後見舟人焚香祈神云告紅頭須小使頭長年三老莫令錯呼錯喚問何謂長年三老云稍公是也長讀如長幼之長乃知老杜長年三老長歌裏白晝攤錢髙浪中之語蓋如此因問何謂攤錢云博也按梁冀能意錢之戲注云即攤錢也則攤錢之為博亦信矣予以世人讀杜詩者多以長字為平聲故載陸語賔退録卷四
