body:
  text: 賔退錄卷五宋趙與峕撰列仙傳琴髙趙人也以鼓琴為宋康王舍人行涓彭之術浮游冀州涿郡間二百餘年後辭入涿水中取龍子弟子潔齋候於水傍且設祠屋果乘赤鯉出祠中留一月餘復入水去今寧國府涇縣東北二十里有琴溪溪之側石臺髙一丈曰琴髙臺俗傳琴髙隠所有廟存焉溪中别有一種小魚他處所無俗謂琴髙投藥滓所化號琴髙魚歲三月數十萬一日來集漁者網取漬以鹽而曝之州縣須索無藝以為苞苴土宜其來乆矣舊亦入貢乾道間始罷前輩多形之賦詠梅聖俞王禹玉歐陽文忠公皆有和梅公儀摯琴髙魚詩聖俞詩云大魚人騎上天去留得小鱗來接觴吾物吾鄉不須念大官常膳有肥羊禹玉詩云三月江南花亂開青溪曲曲水如苔琴髙一去無蹤跡枉是漁人尚見猜文忠詩云琴髙一去不復見神仙雖有亦何為溪鱗佳味自可愛何必虚名矜好竒聖俞又有宣州雜詩二十首其一云古有琴髙者騎魚上碧天小鱗隨水至三月滿江邊少婦自撈摝逺人無棄捐慿書不道薄賣取青銅錢聖俞宣人也汪彦章嘗賦長篇百川萃南州水族何磊砢其間琴髙魚初未列楚些豈堪陪薧鮮裁用當殽果土人私自珍千里事封裹遂令四方傳噍嚼亦云頗俗云琴髙生控鯉宛溪左靈蹤散如煙遺鬛尚餘顆向來騎鯨人逸駕嘗慕我不應當時遊反用此么麽得非效齊諧怪者記之過彭越小如錢蹤跡由漢禍越書載王餘變化更微瑣因知天地間人莫窮物夥區區於其中臆決蓋不可偽眞吾何知且用慰頥朶故山谷送舅氏野夫之宣城詩有云籍甚宣城郡風流數貢毛霜林收鴨脚春網薦琴髙蜀人任淵注此詩不知宣城土地所宜但引列仙傳事直云琴髙鯉也誤矣公儀詩恨未見汪詩不載集中吳虎臣曾漫錄云婺州下里有俗字如以􅀢為矮䬩為齋訟牒文案亦然范文穆桂海虞衡志云邊逺俗陋牒訴劵約專用土俗書桂林諸邑皆然今姑記臨桂數字雖甚鄙野而偏傍亦有依附􅀢音矮不長也􅮚音穏坐於門中穏也􅀢亦音穏大坐亦穏也仦音嫋小兒也奀音勒人瘦弱也􅀢音終人亡絶也􅀢音臘不能舉足也􅀈音大大女及姊也􅲢音磡山石之巖窟也閂音􅗚門横關也他不能悉記嶺外代荅於此外又記五字汆音酋言人在水上也氼音魅言没入水下也閄和馘切言隠身忽出以驚人之聲也􅂒音鬍言多髭也丼東敢切以石擊水之聲也余按魏書江式傳延昌三年上表論字不正體略曰皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯𨽻體失真俗學鄙習復加虚巧談辨之士又以意說炫惑於時難以釐改乃曰追來為歸巧言為辯小兒為䨲神蟲為蠶如斯甚衆又顔氏家訓載北朝喪亂之餘書迹鄙陋加以專輒造字乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為老如此非一徧滿經傳乃知俗字何代無之車同軌書同文豈易能哉與峕昔年侍先人官贑之石城俗字如此者尤多今不能記憶唐君臣正論載武后改易新字如以山水土為地千千萬萬為年永主久王為證長正主為聖一忠為臣一生為人一人大吉為君然嘗考之但有埊􅙷四字合證作聖作􅀈君作皆與正論所言不同今大理國文書至廣右者猶書國作圀亦後所改又吳主孫休名字四子嘗創音灣莔音迄音脫􅀢音礥壾音莽昷音舉音褒㷏音擁八字南漢劉巖自制龑音儼字為名蓋取飛龍在天之意云論語子張問崇徳辨惑子曰主忠信徙義崇徳也愛之欲其生惡之欲其死既欲其生又欲其死是惑也誠不以富亦祗以異古注曰此詩小雅也祗適也言此行誠不足以致富適足以為異耳取此詩之異義以非之正義曰取此詩之異義以非人之惑也范氏謂人之成徳不足以富亦祗以行異於野人而已侯氏謂若其誠不富祗以取異耳伊川謂此錯簡當在第十六篇齊景公有馬千駟之上因此下文亦有齊景公字而誤也楊文靖尹和靖朱文公皆從之南軒謂言其誠實之不富祗以自取異云耳與峕按我行其野之詩誠作成取義與此不類不當遷就以求合此孟子所謂說詩者不以文害辭不以辭害志者也嘗聞平安趙先生云此特因子張之問而荅之學者之學聖人蓋不止此富者道盛徳至善之謂常人不能主忠信不能徙義愛之者未免欲其生惡之者未免欲其死若能反之誠未可謂之至善但亦足以異於常人而已此說最明白唐張鷟自號浮休子張芸叟蓋襲其名南唐保大中賜道士譚紫霄號金門羽客事見廬山記祐陵賜林靈素號用此故事彭器資洪忠宣皆號鄱陽集王岐公張彦正皆號華陽集楊文公胡文定皆號武夷集魏仲先李漢老皆號草堂集謝無逸俞退翁傅子駿皆曰溪堂蘇子美張㑹川張徽皆曰滄浪李師中石守道皆曰徂徠晏元獻王荆公皆曰臨川他如錢文僖有伊川集邵康節有伊川擊壤集而程子又號伊川朱文公編二程文題河南程氏文集而尹師魯先有河南集又吕居仁舍人詩曰東萊先生詩集而從孫太史成公學者亦尊之曰東萊先生其著述尤多凡此數者驟見其名未免疑混要皆不若漢魏以來諸文人但標姓名曰某人某人集之為明白洞達也漢書揚雄傳云劉棻嘗從雄學作竒字韓文公題張十六所居詩云端來問竒字為我講聲形然傳但云學作竒字不言問竒字後來相承而用蓋又以韓詩為本傳又曰家素貧嗜酒人希至其門時有好事者載酒肴從遊學與前學作竒字凡隔數十字了不相涉而近世文人多云載酒問字載酒問竒字之類不知何所本也藝文志云蕭何草律太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史書令史史六體者古文竒字篆書𨽻書繆篆虫書師古曰古文謂孔子壁中書竒字則古文而異者也許叔重說文解字云亡新居攝使大司空甄豐等校文書之部時有六書一曰古文孔子壁中書也二曰竒字即古文而異者也與顔注合其後晉衛巨山四體書勢元魏江式論書表皆同然則竒字者與科斗文字畧相似而異於小篆六書之一體耳今人才見書籍中難字便謂之竒字非也容齋三筆摘周禮中字如㲈飌鱻之類凡數十為一則題曰周禮竒字且云前賢以為此書出於劉歆歆常從揚子雲學作竒字故用以入經蓋亦失於詳考學作竒字者歆之子棻亦非歆也王荆公一日訪蔣山元禪師坐間談論品藻古今元曰相公口氣逼人恐著述搜索勞役心氣不正何不坐禪體此大事又一日謂元曰坐禪實不虧人余數年欲作胡笳十八拍不成夜坐間已就元大笑事見宗門武庫元魏青州刺史公孫邃卒官髙祖在鄴宫為之舉哀青州佐吏疑為所服詔主簿近代相承服斬過塟便除可如故事自餘無服大成寥落可準諸境内之民為齊衰三月則知境内之民舊為刺史制服矣近世所無也然河中蒲坂人石文徳自祖父以來凡刺史守令卒官者皆制服送之朝廷遂標榜門閭史官復列之節義傳夸而書之審如邃傳所言則文徳之事不足為異矣此又何耶啟顔錄載元魏太府少卿孫紹對靈太后臣年雖老臣卿乃少於是拜正卿按魏書亦書此事然紹自太府少卿遷右將軍太中大夫非正卿也孝莊建義初復除衛尉少卿將軍如故永安中方拜太府卿權利所在小人之所必爭故雖父子之親有不恤也晉㑹稽王道子得政之乆末年有疾加以昏醉其子元顯知朝望去之謀奪其權諷天子解道子揚州刺史及司徒而道子不之覺元顯遂自為揚州刺史既而道子酒醒方知去職於是大怒而無如之何其後又加元顯錄尚書事先是謝安薨後道子已錄尚書至是更為長夜之飲政無大小一委元顯時謂道子為東錄元顯為西錄西府道車騎塡凑東第門下可設雀羅矣蔡京蔡攸父子俱貴權勢日相軋輕薄者互煽搖以立門户由是父子遂為仇敵攸别賜第嘗詣京京方與客語使避之而呼攸入甫就席遂起握父手為切脉狀曰大人脉勢舒緩體中得無有疾乎京曰無之攸曰禁中適有公事不得留遂去客竊窺得其事以問京京曰君不解此此輩欲以吾疾罷我也居數日京果致仕又以季弟絛鍾愛於京數白徽宗請殺之徽宗曰太師老矣不許但削絛官而已此四臣者卒皆貽家國之禍善乎康節先生之言曰人之所謂親莫如父子也人之所謂疎莫如路人也利害在心則父子過路人逺矣父子之道天性也利害猶或奪之況非天性者乎夫利害之移人如是之深也可不慎乎路人之相逢則過之固無相害之心焉無利害在前故也有利害在前則路人與父子又奚擇焉路人之能相交以義又何況父子之親乎夫義者讓之本也利者爭之端也讓則有仁爭則有害仁與害何相去之逺也堯舜人也桀紂亦人也人與人同而仁與害異爾仁因義而起害因利而生利不以義則臣弑其君者有焉子弑其父者有焉豈若路人之相逢一目而交袂於中逵者哉歐陽文忠公著五代史記梁太祖本紀初稱温賜名後稱全忠封王後稱王至即位始稱皇帝徐無黨注曰始而稱名既而稱爵既而稱帝漸也爵至王而後稱著其逼也末帝而下訖于漢周諸帝紀皆然而新唐書本紀髙祖之生即稱髙祖太宗方四歲已書太宗二書出一手而書法不同如此未詳其㫖昔李子經郛作緯文瑣語亦云唐五代史書皆公手所修然義例絶有不同者一人之作不應相去如此之逺議者謂唐書蓋不盡出公意前車之覆後車之戒也元魏道武以服寒食散發動喜怒乖常遂來弑逆其子明元可以已矣而又服此藥不堪萬幾旋致夭折唐穆宗因擊毬暴得疾浸淫以至於崩其子敬宗亦可以已矣而聽政未踰月已連日為此戲自此馳逐不已宦者恐懼不三年而身罹不測之禍所謂下愚不移者與俗說愚人以八百錢買匹絹持以染緋工費凡千二百而僅有錢四百於是併舉此絹足其數以償染工艾子云人有徒行將自吕梁托舟趨彭門者持五十錢造舟師師曰凡無齎而獨載者人百錢汝尚少半吾不汝載也人曰姑收其半當為挽縴至彭門以折其半又夷堅戊志載汪仲嘉大猷自言其族人之僕出幹抵暮趦趄呻吟而來問何為曰恰在市橋上有保正引繩縛二十人過亦執我入其中我號呼不伏則以錢五千置我肩上曰以是倩汝替我喫縣棒我度不可免又念經年傭直不曾頓得五千錢不可失此遂勉從之到鄞縣與同縛者皆決杖乃得脫汪曰所得錢何在曰以謝公吏及杖直之屬僅能給用向使無此將更受楚毒豈能便出哉汪笑曰憨畜産可謂癡人僕猶愠曰官人是何言同行二十人豈皆癡耶竟不悟前二事蓋寓言以資笑謔而後一事乃真有之吳虎臣辨唐異聞集所載開元中道者吕翁經邯鄲道上邸舍中以囊中枕借盧生睡事謂此吕公非洞賔也蓋洞賔自序以為吕渭之孫渭仕徳宗朝今云開元中則吕翁非洞賔無可疑者而或者又以為開元恐是開成字亦非也開成雖文宗時然洞賔此時未可稱翁本朝國史稱關中逸人吕洞賔年百餘歳而狀貌如嬰兒世傳有劍術時至陳摶室若以國史證之止云百餘歲則非開元人明矣雅言系述有吕洞賔傳云關右人咸通中舉進士不第值巢賊為梗攜家隠居終南學老子法以此知洞賔乃唐末人此皆吳說蕭東夫吕公洞詩云復此經過三十年唯應巖石故依然城南老樹朽為土簷外稚松青拂天枕上功名祗攪攪指端變化又𤣥𤣥刀圭乞與起衰病稽首秋空一劍仙第五句誤用吕翁事又唐逸史虞鄉永樂兩縣連接有吕生者居二邑間為童兒時畏聞食氣唯食黄精日覺輕健耐風寒見文字及人語率不忘母及諸妹每勸其食不從後以猪脂置酒中强使飲生方固拒已嘘吸其氣忽一黄金人長二寸許自口出即仆卧困􅉵移時方起先是生年近六十鬢髮如漆至是皓首恨惋埀泣再拜别母去之茅山不知所終此又一人也何神仙多吕氏乎俗謂婚姻之家曰親家唐人已有此語見蕭嵩傳又有以親字為去聲者亦有所據盧綸作王駙馬花燭詩有人主人臣是親家之句山海經洞庭之山帝之二女居之郭氏注云天帝之二女而處江為神即列仙傳江妃二女也離騷九歌所謂湘夫人稱帝子者是也而河圖玉版曰湘夫人者帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而塟此列女傳曰二女死於江湘之間俗謂為湘君鄭司農亦以舜妃為湘君說者皆以舜陟方而死二妃從之俱溺死於湘江遂號為湘夫人按九歌湘君湘夫人自是二神江湘之有夫人猶河洛之有虙妃也此之為靈與天地並矣安得謂之堯女且既謂之堯女安得復總云湘君哉何以考之禮記曰舜塟蒼梧二妃不從明二妃生不從征死不從塟義可知矣即令從之二女靈達鑒通無方尚能以鳥工龍裳救井廩之難豈當不能自免於風波而有雙淪之患乎假復如此傳曰生為上公死為貴神禮五嶽比三公四瀆比諸侯今湘川不及四瀆無秩於命祀而二女帝者元后配靈神祗無緣當復下降小水而為夫人也參伍其義義既混錯錯綜其理理無可據斯不然矣原其致謬之由由乎俱以帝女為名名實相亂莫矯其失習非勝是終古不悟可悲矣其說最近理而古今傳楚詞者未嘗及之書于此以祛千載之惑張華博物志多出於山海經然末卷載湘夫人事亦誤以為堯女也戰國䇿舊傳髙誘注殘缺疎略殊不足觀姚令威寛補注亦未周盡獨縉雲鮑氏彪校注為優雖間有小疵多不害大體惟東西二周一節極其舛謬深誤學者反不若二氏之說是然髙氏但云東周成周今洛陽西周王城今河南其說甚略姚氏特作世系譜似稍詳矣而亦未偹其指鞏為東周則又未免小誤今世學者但知鎬京之為西周東遷之為東周而已若敬王之遷成周固已漫漶至於兩周公之東西周則自非熟於考古者蓋茫不知其所以也此鮑氏之誤所以不得不辨余故博採載籍究極本末而論焉周之先后稷始封於邰不窋自竄於戎狄公劉徙居於豳至於太王徙居岐周文王降崇乃作豐邑自岐而徙都焉武王之時復營鎬京而居之詩書稱宗周者指鎬京也迄東遷之前無所遷徙然武成云王來自商至于豐召誥序云成王在豐周官序云還歸在豐左傳亦曰康有酆宫之朝則雖改邑于鎬而豐宫元不廢蓋豐在京兆鄠縣鎬在長安縣西北十八里相距纔二十五里往來不為勞也武王克商之後嘗曰我南望三塗北望嶽鄙顧瞻有河粤瞻伊洛毋逺天室營周居于洛邑蓋洛邑居土地之中宜作天邑武王既得天下有都洛之意矣而未暇及也先於其地遷九鼎焉武王崩周公相成王成武王之志營以為都是為王城其地實郟鄏亦名河南洛誥所謂我乃卜澗水東瀍水西惟洛食者也洛陽者周公營下都以遷殷頑民是為成周其地又在王城之東洛誥所謂我又卜瀍水東亦惟洛食者也洛誥序云周公往營成周則成周乃東都總名河南成周之王城也洛陽成周之下都也王城非天子時㑹諸侯則虚之下都則保釐大臣所居治事之地周人朝夕受事習見既乆遂獨指以為成周矣按洛誥王祀于新邑召誥王來紹上帝自服于土中則成王固嘗居之然卒駕而西也宣王中興嘗一㑹諸侯於東都下至幽王為犬戎所滅宗周迫近戎狄平王之立不得已而東遷都於王城始奠居焉自是始有東西周之名謂之東者以别於鎬京之為西耳河南洛陽未分畫也王子朝之亂其餘黨多在王城敬王畏之徙都成周後九十餘年考王弑兄而自立懼弟揭之議已遂以王城封之以續周公之官職是為西周桓公此時未有東周公而稱西周者後人推本而言之也桓公傳威公威公傳惠公考王十五年西周惠公封其少子班於鞏以奉王是為東周惠公父子同諡而西周惠公長子自為西周武公自是周公之國始東西城分周為東西王城復為西周矣蓋自河南桓公續周公之職而秉政三世一專所以别封少子使奉王者殆欲獨擅河南之地不復奉王且王城成周皆為東西周君所有天子直寄焉耳東周者指周王所居之洛陽也鞏班之采邑也世本曰東周惠公名班居洛陽是班秉政於洛陽而采邑則在鞏前漢地理志曰鞏東周所居姚令威用其說非也赧王時東西周分治王復徙都西周至五十九年秦昭王使將軍摎攻西周西周君奔秦頓首受罪盡獻其邑三十六秦受其獻歸其君於周蓋權移於下其極乃至於盡獻其邑於他人亦不出於天子之命矣是年赧王卒其國先絶西周武公亦卒秦遷西周公於􅓆狐實武公子公子咎者而東周惠公之後亦尚能一傳後七歲秦莊襄王盡滅東西周始不祀大略如此戰國策之西周即揭之西周戰國策之東周即班之東周西周建國在東周之前而舊書躋東周於西周之上為失其次鮑氏正之是矣但其說曰西周正統也不可以後於東周其注韓使人讓周則曰此時周之命已不行於諸侯矣其注周君謀主也則曰猶為天子故他如此類不一又盡以西周之策分繫之安赧二王蓋直以西周為天子而不知實桓威諸公之事也余嘗反覆考之東西二周之策皆曰周君至周君自謂必曰小國曰寡人皆當世諸侯之稱其間或及周王則直稱王或稱天子非不明白鮑氏乃比而一之可乎原其致誤之由蓋亦有說温人之辭云今周君天下則我天子之臣周君天下者言周王之君天下也鮑必誤以為周君有天下矣又東周與西周戰韓救西周為東周謂韓王曰西周者故天子之國也多名器重寳是時周王未徙西周故天子之國者謂敬王故都也鮑必愈疑西周君即天子矣不特此也周王周公國號既同史記不為二周公立世家而混書其事於周紀宋忠注周君王赧卒又不知周君與王赧此年俱卒但見二者連文遂謂赧王卒諡西周公武小司馬張守節輩皆能辨之然世多承其誤雖如司馬文正公亦不能免通鑑直以奔秦獻邑者為赧王稽古錄中復誤以西周桓公為東周無責乎鮑也東周䇿首章書秦臨周求鼎事鼎實在西而不在東也豈周王在東故東周君猶能挾天子以制命歟不然則錯簡也注家皆無發明者因併及之曾文清訪戴圖詩小艇相從本不期剡中雪月並明時不因興盡回船去那得山隂一段竒近歳豫章米子儀亦賦此詩四山搖玉夜光浮一舸玻璃凝不流若使過門相見了千年風致一時休末句實祖文清之意俗諺洗脚上船語見三國志吕蒙傳注引吳錄曰孫權欲作濡須塢諸將皆曰上㟁擊賊洗足上船何用塢為蒙曰兵有利鈍戰無百勝如有邂逅敵步騎蹙人不暇及水其得入船乎權曰善遂作之淳熙十四年冬十一月丙寅宰執奏事延和殿宿直官洪邁同對因論髙宗諡號孝宗聖諭云太上時有老中官云太上臨生徽宗嘗夢吳越錢王引徽宗御衣云我好來朝便留住我終須還我山河待教第三子來邁又記其父皓在邊買一妾東平人偕其母來母曾在明節皇后閤中能言顯仁皇后初生太上時夢金甲神人自稱錢武肅王寤而生太上武肅即鏐也年八十一太上亦八十一卜都於此亦不偶然張淏雲谷雜記僅載其略且不記其語之所自得獨周必大思陵錄備載其詳如此上所諭錢王指俶俶第三子惟演也終團練使賔退錄卷五
