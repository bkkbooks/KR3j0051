body:
  text: 賔退録卷三宋趙與峕撰晉簡文母鄭太后諱阿春晉人避其諱皆以春秋為陽秋后傳孝武下詔依陽秋故事上尊號孝武母李太后傳何澄等議服制曰陽秋之義母以子貴是也若禇裒傳桓彛目之曰有皮裏陽秋荀奕傳張闓孔愈難奕駁陳留王出城夫謂宋不城周陽秋所譏則皆事在鄭后之前晉之史官追改以避之耳故孫盛輩著書曰晉陽秋近世葛常之侍郎立方作詩話極其該洽顧名之曰韻語陽秋以今人而為晉諱不深考也晉世后諱多矣獨避鄭諱為不可曉然盛又有魏氏春秋習鑿齒亦著漢晉春秋司馬彪作九州春秋則當時亦不盡避史官亦不能盡改蓋晉史凡十八家而唐人修書又出於二十一人之手豈無同異耶世俗稱列寺卿曰大卿諸監曰大監所以别於少卿監自國初以寺監寄祿之時已然相承甚久然前代但有大鴻臚大司農大匠而已大卿大監之名殊不典元魏雖有大宗正卿大司農卿隋亦有新都大監然皆不足證也獨晉人謂著作郎為大著作職官志亦然今稱著作郎曰大著粗有據依元昊冦邊韓忠獻駐兵延安夜有人攜匕首至卧內遂褰帷韓起坐問誰何曰某來殺諫議誰遣汝來曰張相公蓋張元也韓復就枕曰汝攜我首去曰某不忍願得諫議金帶足矣取帶而出明日不復治其事俄守陴卒報城櫓上得金帶乃納之明受之變張忠獻自平江起義勤王行次嘉禾一夕坐至夜分警備嚴甚忽有刺客至前出腰間文書乃苗劉使來賊公者賞格甚盛時左右睡已熟張遽問爾欲何為對曰某河北人粗知逆順豈肯為賊用況侍郎精忠大節感通神明某又安忍致害邪特見備禦未至恐後復有來者故相報耳張下執其手問其姓名曰某粗讀書若言姓名是徼後利顧有母在河北今徑歸矣拂衣而去超捷若神翼日張取郡獄死囚斬以徇曰此刺客也私識其人終身物色竟不遇二事頗相似但受帶一節韓不及張而前之刺客亦不可以望後者也漢梁王使人刺爰盎刺者至關中問盎稱之皆不容口乃見盎曰臣受梁王金刺君君長者不忍刺然後刺者十餘曹備之又與張事相類然爰卒不免而張竟無他張公忠臣爰非真長者天理為不誣矣韓事見王彥輔麈史張事具行狀光逸為門亭長迎新令至京師胡母輔之輩詣令家望見竒之李矩為吏送故縣令於長安梁王肜以為牙門以是知吏從迎送之儀晉已然矣宋書庾登之傳載其除豫章太守自臨川便道之官亦云儀迓光赫又謝方明自晉陵太守為南郡相晉陵亦有送故主簿隨在西蕭梁時諸鎮皆有迎主簿今人以月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日不食肉謂之十齋釋氏之教也余按唐會要武德二年正月二十四日詔自今已後每年正月九月及每月十齋日並不得行刑所在公私宜斷屠釣永為常式乾元元年四月二十二日敇每月十齋日及忌日並不得採捕屠宰仍永為式其來尚矣九國志亦載南唐大臣多蔬食月為十齋今斷獄律疏議列此十日謂之十直日白樂天於潯陽舟中見商婦賦琵琶行其中有云商人重利輕别離前月浮梁買茶去是時此商留家潯陽而逺取茶於浮梁始知潯陽之茶唐未有也今其行幾遍天下而浮梁所産反不著時代推移而土地所生亦復變遷如此晉書王育仕劉淵為太傅韋忠仕劉聰為鎮西大將軍劉敏元仕劉曜為中書侍郎三人者皆嘗委質於晉矣而皆謂之忠義王宏桎梏罪人以泥墨塗面置深坑中餓不與食太康中檢察士庶使車服異制宏緣此復遣吏科檢婦人衵服至褰發於路顧謂之良吏王渾妻鍾氏嘗夫婦共坐其子濟趨庭而過渾欣然曰生子如此足慰人心鍾笑曰若使新婦得配參軍生子故不翅如此參軍者渾弟淪也顧謂之烈女真可發一笑邵康節洛陽春八絶其一云四方景好無如洛一嵗花竒莫若春景好花竒精妙處又能分付與間人先鑑堂朝野遺事載吕吉甫在趙韓王南園京師丐人曰風乞兒者持大扇造吕求詩吕即書扇上無人肯作佐除非乞沒藥堪醫最是風求乞害風都占斷算來世上少如公吕詩雖戲謔然句體絶與邵詩相類吕居仁舍人嘗與汪聖錫尚書論並拜兩相獨曾文昭草文肅制為得右相詞命之體乾道間虞忠肅拜右揆汪適當制遂祖其意而為之余按曽制云左右置相以總吾喉舌之司東西分臺以斡我鈞衡之任居中如鼎足之峙承上若台符之聮相須而成闕一不可乃登次輔以告大廷汪制云朕洪惟國朝之制並建宰輔之司應變守文咸底於道獻可替否各單厥心矧豫繼承惟日兢惕懋乃后德交修繄賴於同寅揚于王庭孚號式新於衆聼其登次相以叶舊章似微不及也初韓忠彥拜左僕射蔡京當制欲刺探徽宗之意徐奏請曰制詞合作專任一相或作分任兩相之意徽宗曰專任一相翼日京出宣言曰子宣不復相矣已而復召肇草制拜布右僕射肇之詞蓋有為云李昊仕於蜀王衍之亡為草降表及孟昶降又草焉蜀人夜表其門曰世修降表李家當時傳以為笑余記晉謝淡少歷顯位桓玄之篡以淡兼太尉與王謐俱齎册到姑孰元熙中為光祿大夫復兼太保持節奉册禪宋正堪作對漢昭帝察霍光之忠知燕王上書之詐後世稱其明順帝時張逵輩譖梁商謀廢立帝知其妄收逵等殺之與昭帝相類洪文敏謂順帝復以政付梁冀其明非昭帝比故不為人所稱前燕慕容暐初立慕容根譖慕容恪慕容評將謀為亂暐曰二公國之親穆先帝所託終應無此未必非太師將為亂也收根等斬之可與昭順並稱考三君之年昭帝十四順帝二十五而暐方十一尤不可及然其末年恪既死母后亂朝評以黷貨干政不能容慕容垂之勳德遂為苻秦所滅與早歲殊不相似又非順帝比也東蜀楊天惠撰彰明縣附子記云綿州故廣漢地領縣八惟彰明出附子彰明領鄉二十惟赤水廉水會昌昌明宜附子總四鄉之地為田五百二十頃有竒然粳稻之田五菽粟之田三而附子之田止居其二焉合四鄉之産得附子一十六萬斤已上然赤水為多廉水次之而會昌昌明所出微甚凡上農夫嵗以善田代處前期輒空田一再耕之蒔薺麥若巢縻其中比苗稍壯并根葉耨覆土下復耕如初乃布種每畝用牛十耦用糞五十斛七寸為壠五尺為符終畝為符二十為壠千二百壠從符衡深亦如之又以其餘為溝為塗春陽墳盈丁壯畢出疏整符壠以需風雨風雨時過輒振拂而駢持之既又挽草為援以御烜日其用工力比它田十倍然其嵗獲亦倍稱或過之凡四鄉度用種千斛以上種出龍安及龍州齊歸木門青塠小平者良其播種以冬盡十一月止採擷以秋盡九月止其莖類野艾而澤其葉類地麻而厚其花紫葉黃㽔長包而圓蓋其實之美惡視功之勤窳以故富室之入常美貧者雖接畛或不盡然又有七月採者謂之早水拳縮而小蓋附子之未成者然此物畏惡猥多不能常熟或種美而苗不茂或苗秀而實不充或已釀而腐或已暴而攣若有物焉隂為之故園人將採常禱於神或目為藥妖云其釀法用醯醅安密室淹覆彌月乃發以時暴涼久乃乾定方出釀時其大有如拳者已定輒不盈握故及兩者極難得蓋附子之品有七實本同而末異其種之化者為烏頭附烏頭而傍生者為附子又左右附而偶生者為鬲子又附而長者為天雄又附而尖者為天佳又附而上出者為側子又附而散生者為漏籃皆脈絡連貫如子附母而附子以貴故獨專附名自餘不得與焉凡種一而子六七以上則其實皆小種一而子二三則其實稍大種一而子特生則其實特大此其凡也附子之形以蹲坐正節角少為上有節多鼠乳者次之形不正而傷缺風皺者為下附子之色以花白為上鐵色次之青緑為下天雄烏頭天佳以豐實過握為勝而漏籃側子園人以乞棄役夫不足數也大率蜀人餌附子者少惟陜輔閩浙宜之陜輔之賈才市其下者閩浙之賈才市其中者其上品則皆士大夫求之蓋貴人金多喜竒故非得大者不厭然上人有知藥者云小者固難用要之半兩以上皆良不必及兩乃可此言近之按本草經及注載附子出犍為山谷及江左山南嵩髙齊魯間以今考之皆無有誤矣又云春採為烏頭冬採為附子大謬又云附子八角者良其角為側子愈大謬與余所聞絶異豈所謂盡信書不如無書者類耶以上皆楊説古涪志既刪取其略著于篇然又云天雄與附子類同而種殊附子種近類漏籃天雄種如香附子凡種必取上為槽作傾邪之勢下廣而上狹置種其間其生也與附子絶不類雖物性使然亦人力有以使之此又楊説所未及也審如志言則附子與天雄非一本矣楊説失之本草圖經與此小異廣雅云奚毒附子也一嵗為萴與側同子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄蓋亦不然鬲子天佳漏籃三物本草皆不著張華博物志又云烏頭天雄附子一物春秋冬夏採各異也左氏傳內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入漢太始四年趙有蛇從郭外入邑與邑中蛇羣鬭孝文廟下邑中蛇死六年而武帝崩異哉然趙敬肅王彭祖薨於次年亦其應也玉壺清話真宗問近臣唐酒價幾何丁晉公奏曰每升三十杜甫詩曰速須相就飲一斗恰有三百青銅錢與時嘗因是戲考前代酒價多無傳焉惟漢昭帝罷榷酤之時賣酒升四錢明著於史劉貢父云所以限民不得厚射利是已典論謂孝靈末百司湎酒酒千文一斗曹子建樂府歸來宴平樂美酒斗十千此三國之時也然唐詩人率用此語如李白金樽清酒斗十千王維新豐美酒斗十千白樂天共把十千酤一斗又軟美仇家酒十千方得斗又十千一斗猶賖飲何况官供不著錢崔輔國與沽一斗酒恰用十千錢郎士元六言絶句十千提攜一斗逺送瀟湘故人皆不與杜詩合或謂詩人之言不皆如詩史之可信然樂天詩最號紀實者豈酒有美惡價不同歟抑何其遼絶耶穆宗朝王仲舒為江西觀察使時穀數斛易斗酒尤可怪楊凝詩湘隂直與地隂連此日相逢憶醉年美酒非如平樂貴十升不用一千錢嶺表録異云廣州人多好酒生酒行兩面羅列皆是女人招呼鄙夫先令嘗酒盎上白瓷甌謂之􅀈一􅀈三文不持一錢來去嘗酒致醉者當壚嫗但笑弄而已嶺表録異唐之書也今必不然􅀈字不見於字書説文云甌瓿謂之瓵瓵盈之切疑是瓵字傳寫之誤或南方俗字自有􅀈字亦不可知若梁元帝長歌行當壚擅旨酒一巵堪十千謂之堪則非真十千也諺謂物多為無萬數漢書成帝紀語漢成帝詔言昌陵作治五年客土疏惡終不可成服虔注曰取他處上以增髙為客土乃知客土二字其來甚古唐書方伎杜生傳亦有客土無氣之語蓋又近世云唐太宗時米斗三錢後世以為美談梁天監四年米斛亦三十錢唐元和六年天下米斗有直二錢者人罕稱道然皆不若漢宣帝元康間嘗穀石五錢矣此古今所無也東魏元象興和中穀斛九錢可以為次矣漢世大率錢重前所書酒升四錢穀石五錢槩可推已元康神爵之間金城湟中穀斛亦不過八錢惟元帝永光二年歲比不登京師穀石二百餘邊郡四百關東五百時四方飢饉朝廷以為憂而其先初元二年齊地飢穀石財三百餘民已多餓死者矣王莽時黃金一斤直錢萬朱提善銀八兩直一千五百八十它銀八兩直一千而已髙帝賀吕公紿曰賀錢萬吕公大驚起迎之門顏師古謂以其錢多故特禮之若今世十千何足驚也元帝臨獸圈猛獸驚出馮貴人前當之帝雖嘉美其義僅賜錢五萬惠帝元年民有罪得買爵三十級以免死罪應劭謂一級直錢二千凡為六萬武帝天漢大始間募死罪入贖錢五十萬減死一等雖數踰惠帝時八倍然後世正使匱乏之極亦何肯出此令可見當時錢之艱得也至成帝鴻嘉中買爵之賈殺而為千錢矣西都制祿以穀奉錢皆無所考僅可知者丞相大司馬大將軍月六萬御史大夫月四萬光祿大夫月萬二千司𨽻校尉月數千諫大夫月九千二百秩百石月六百待詔公車月二百四十其薄至此貢禹遷光祿大夫猶謂家日益富後漢之制凡受俸者皆半錢半穀延平中定制中二千石俸錢月九千不若今世初品官之奉也洪文惠𨽻釋云漢刻載修廟及表墓人所費有出錢百者熹平四年濟隂太守張寵以二千祠堯碑遂夸而書之貢禹被徵賣田百畝以供車馬以今江浙田賈會之不減二三千緡車馬之費當不至是則當時田賈亦非今比西都外戚之盛萌芽於元帝之時王嘉謂是時資千萬者尚少他復何言崔烈入錢五百萬得為司徒五百萬五千緡也以今助邊之數校之但可得校副尉耳併發觀者一笑漢長安有四尉晉洛陽有六尉隋改縣尉為縣正又為書佐新唐書百官志注云唐武德元年改書佐曰縣尉尋改曰正畿縣上縣正皆四人七年改縣正復曰尉然唐六典載萬年長安河南洛陽奉先太原晉陽七縣尉各六人京兆河南太原諸畿縣及諸州上縣尉各二人而已新舊唐書皆從之新書自與注文矛盾不能定于一也按李太白作溧陽瀨水貞義女碑云縣尉廣平宋陟丹陽李濟南朝陳然清河張昭皆有卿才霸略同事相協又虞城縣令李公去思頌碑亦云縣尉李向趙濟盧榮等同德比義好謀而成以此二碑推之則上縣不止兩尉明矣本朝雖赤縣無三尉者蓋前代無巡檢今劇縣巡檢至四五人小縣亦一二人尉雖少未害也熙寧中華山圯雨木冰已而韓魏公薨王荆公挽詞云木稼曽聞達官怕山頽果見哲人萎西清詩話謂用孔子及唐寧王事寧王事新書無之見於劉耀逺舊史傳中開元二十九年冬京城寒甚凝霜封樹學者以為春秋雨木冰即此是亦名樹介言其象介胄也憲見而歎曰此俗所謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨按漢天文志亦曰今之長老名木冰為木介介者甲甲兵象也余謂稼字義不可通特介聲之訛耳劉向曰冰者隂之盛木者少陽貴臣卿大夫象也此人將有害則隂氣脅木未雨而木先寒故得雨而冰也達官怕之諺本此顔師古注劉向傳謂今俗呼為間樹齊民要術黍穄篇又謂之諫樹云故人楊晉翁天桂嘗語豫昔為瀧水令初謁郡時盛暑德慶林守會衣紗公服出延客謂遐陬僻郡敢於縱肆其野如此後閲初寮外制集有朝散郎劉繹朝見著紗公服特降一官蓋政和間又江鄰幾休復嘉祐雜志云一朝士五月起居衣緋紗公服為臺司所糾三司使包拯亦衣紗公服閣門使易之且詰有何條例答云不見舊例只見至尊御此耳始知何代無之然包公未必爾也唐愼微蜀州晉原人世為醫深於經方一時知名元祐間帥李端伯招之居成都嘗著經史證類備急本草三十二卷盛行於世而艾晟序其書謂慎微不知何許人故為表出蜀今為崇慶府世俗謂自辨解曰分疏平顏師古注爰盎傳不以親為解曰解者若今言分疏又北齊書祖珽傳髙元海奏珽不合作領軍并與廣寧王交結珽亦見帝令引入珽自分疏則北朝暨唐已有是言矣英宗於仁宗為從子宣仁后於光獻為甥自幼同鞠禁中會溫成有寵英宗遂還宫邸宣仁亦歸其家洎溫成薨仁宗竟無子一日謂光獻曰吾夫婦老無子舊養十三滔滔各已長立朕為十三后為滔滔主婚使相娶嫁十三英宗行第滔滔宣仁小字也時宫中謂天子娶婦皇后嫁女事具邵伯溫見聞録與時按漢成帝欲與近臣遊宴張安世玄孫放以公主子且開敏得幸放取皇后弟許嘉女上為放供張賜甲第充以乘輿服飾亦號為天子取婦皇后嫁女又唐中宗時蕭至忠以女妻韋后舅崔從禮子帝主蕭后主崔時謂天子嫁女皇后娶婦此皆非可與聖世同年而語也姑記其語之適同而已王孝先曾諡文正王子明旦諡文貞避仁廟嫌諱亦稱文正後來稱孝先者多稱其封國以為别子明封魏國人罕稱也韓參政億諡忠憲韓魏公諡忠獻字雖不同音則莫辨此四臣者皆名臣也至於趙閲道諡清獻而趙正夫挺之諡清憲則幾於碔玞亂美玉矣絲竹管絃漢張禹傳語王右軍蘭亭序承用之四字實二物耳今職制令諸縣有繁簡難易監司察令之能否隨宜對換仍不理遺闕按薛宣為左馮翊頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小辟在山中民謹朴易治令巨鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣二人視事數月而兩縣皆治則漢已著此令矣近世監司未嘗行也吾夫子論君子小人之情狀與時既書之以自警然邵康節先生諸詩尤能推廣聖人之意不暇悉載特取其尤深切著明者一篇以諗觀者處身吟云君子處身寧人負己己無負人小人處事寧己負人無人負己持此詩以觀人君子小人如辨白黑所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此君子潔矩之道小人何足以知之子貢謂我不欲人之加諸我也吾亦欲無加諸人無加諸人足矣人之加諸我者安能絶之夫子曰賜也非爾所及也蓋未然其言耳康節又有詩云人如負我我何預我若辜人人有詞孟子亦謂自反而仁矣自反而有禮矣自反而忠矣其橫逆由是也則此亦妄人也已矣又何難焉學者當知此意九江琵琶亭壁間題詠甚多嘉泰初撤而新之俱不復存時族父石埭府君丞德化被郡檄督工獨取成都郭宗丞明復一詩刻之石真絶唱也其詩云香山居士頭欲白秋風吹作湓城客眼看世事等虛空雲夢胸中無一物舉觴獨醉天為家詩成萬象遭梳􅐡不管時人皆欲殺夜深江上聽琵琶賈胡老婦兒女語淚濕青衫如著雨此公豈作少狂夢與世浮沈聊爾汝我來後公三百年潯陽至今無管絃長安不見遺音寂依舊康廬翠掃天夏文莊嘗有寄題琵琶亭一絶云流光過眼如車轂薄宦拘人甚馬銜若遇琵琶應大笑何須泣淚滿青衫近時陳益之待制謙又賦續琵琶行有云青衫夜半何曾著引興參差雜椒糈亦皆有新意倦遊雜録載史沆嘗題詩亭上坐上騷人雖有淚江邊寡婦不難欺若使王涯聞此曲織羅應過賞花詩沆早登進士第坐事遷謫而死平生好持人短長世以凶人目之故雖古人亦妄肆詆訾云賔退録卷三
